<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Karma Rank League – Future Picks</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#050508;
      --card:#13131c;
      --border:#1e1e2e;
      --accent:#e8ff3c;
      --text:#f0f0f0;
      --muted:#6b6b80;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
    }

    header {
      text-align:center;
      padding:40px 20px 20px;
      border-bottom:1px solid var(--border);
    }

    h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:56px;
    }

    h1 span { color:var(--accent); }

    main {
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .title {
      color:var(--accent);
      font-family:'Bebas Neue',sans-serif;
      font-size:28px;
      margin-bottom:15px;
    }

    .table-wrap {
      overflow:auto;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--card);
    }

    table {
      width:100%;
      border-collapse:collapse;
      min-width:600px;
    }

    th, td {
      padding:10px 14px;
      border-bottom:1px solid var(--border);
      font-size:13px;
      text-align:left;
    }

    th {
      font-size:11px;
      text-transform:uppercase;
      color:var(--muted);
    }

    td b { color:var(--text); }

    footer {
      text-align:center;
      margin:40px 0;
    }

    .home {
      display:inline-block;
      padding:10px 18px;
      border:1px solid var(--border);
      border-radius:10px;
      text-decoration:none;
      color:var(--text);
      font-weight:700;
    }

    .home:hover {
      border-color:var(--accent);
      color:var(--accent);
    }

    .loading {
      color:var(--muted);
      padding:20px;
    }
  </style>
</head>

<body>

<header>
  <div>Karma Rank League</div>
  <h1>Future <span>Picks</span></h1>
</header>

<main>

  <div class="title">Draft Pick Ownership</div>

  <div class="table-wrap" id="container">
    <div class="loading">Loading...</div>
  </div>

</main>

<footer>
  <a class="home" href="index.html">← Home</a>
</footer>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=1137257969&single=true&output=csv";

async function load() {
  const container = document.getElementById("container");

  try {
    const res = await fetch(URL);
    const text = await res.text();

    const rows = text
      .split("\n")
      .map(r => r.split(",").map(x => x.trim()))
      .slice(1);

    const data = rows.map(r => ({
      team: r[0],
      picks: {
        S2FRP:r[1], S2SRP:r[2], S2TRP:r[3],
        S3FRP:r[4], S3SRP:r[5], S3TRP:r[6]
      }
    }));

    const format = (v, team) => {
      if (!v) return "—";
      v = v.toLowerCase();
      if (v === "y") return team;
      if (v.startsWith("y +")) return team + ", " + v.replace("y +","").trim();
      if (v.startsWith("+")) return v.replace("+","").trim();
      return v;
    };

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Team</th>
            <th>S2 FRP</th>
            <th>S2 SRP</th>
            <th>S2 TRP</th>
            <th>S3 FRP</th>
            <th>S3 SRP</th>
            <th>S3 TRP</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(t => `
            <tr>
              <td><b>${t.team}</b></td>
              <td>${format(t.picks.S2FRP,t.team)}</td>
              <td>${format(t.picks.S2SRP,t.team)}</td>
              <td>${format(t.picks.S2TRP,t.team)}</td>
              <td>${format(t.picks.S3FRP,t.team)}</td>
              <td>${format(t.picks.S3SRP,t.team)}</td>
              <td>${format(t.picks.S3TRP,t.team)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;

  } catch (e) {
    container.innerHTML = "Failed to load data.";
  }
}

load();
</script>

</body>
</html>
