<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karma Rank League – Draft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #050508; --card: #13131c; --border: #1e1e2e;
      --accent: #e8ff3c; --accent2: #ff3c6e; --text: #f0f0f0; --muted: #6b6b80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(232,255,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,60,0.03) 1px,transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    header { position: relative; z-index: 1; padding: 40px 24px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,8vw,72px); letter-spacing: 0.04em; line-height: 1; }
    h1 span { color: var(--accent); }
    main { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 32px 16px 80px; }

    /* Draft info */
    .draft-info { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    
    /* Round tabs */
    .round-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
    .round-tab {
      padding: 7px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; border-radius: 99px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .round-tab.active { background: var(--accent); color: #050508; border-color: var(--accent); }

    /* Draft board */
    .round-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 14px; }
    .pick-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .pick-row { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; }
    .pick-row.filled { border-color: rgba(232,255,60,0.2); background: rgba(232,255,60,0.04); }
    .pick-row.on-clock { border-color: var(--accent2); background: rgba(255,60,110,0.05); animation: pulse-border 1.5s ease-in-out infinite; }
    @keyframes pulse-border { 0%,100%{border-color:var(--accent2);} 50%{border-color:rgba(255,60,110,0.3);} }

    .pick-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); width: 36px; text-align: center; flex-shrink: 0; }
    .pick-team { font-size: 13px; font-weight: 700; color: var(--text); min-width: 130px; flex-shrink: 0; }
    .pick-player { flex: 1; font-size: 14px; font-weight: 600; color: var(--accent); }
    .pick-empty { flex: 1; font-size: 13px; color: var(--muted); font-style: italic; }

    /* Page tabs */
    .page-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .page-tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; min-width: 80px; }
    .page-tab.active { background: var(--accent); color: #050508; border-color: var(--accent); }
    .page-section { display: none; }
    .page-section.active { display: block; }

    /* Forms */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 16px; }
    .btn { width: 100%; background: var(--accent); color: #050508; border: none; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
    
    /* Table styles */
    .picks-season-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 10px; }
    .picks-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow-x: auto; }
    .picks-table { width: 100%; border-collapse: collapse; min-width: 500px; }
    .picks-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    .picks-table td { padding: 9px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Season Draft</div>
  <h1>Karma <span>Rank</span> League</h1>
</header>

<main>
  <div class="page-tabs">
    <div class="page-tab active" data-page="current">Current Draft</div>
    <div class="page-tab" data-page="picks">Draft Picks</div>
    <div class="page-tab" data-page="past">Past Drafts</div>
  </div>

  <div class="page-section active" id="page-current">
    <div style="background:rgba(232,255,60,0.08);border:1px solid rgba(232,255,60,0.25);border-radius:12px;padding:14px 18px;margin-bottom:20px;text-align:center;font-size:14px;font-weight:700;color:var(--accent);">Season 1 Draft Has Ended</div>
    <div class="round-tabs" id="round-tabs"></div>
    <div id="draft-board"></div>
  </div>

  <div class="page-section" id="page-picks">
    <div id="picks-container">
        <p style="text-align:center; color:var(--muted); padding:20px;">Loading Ownership Data...</p>
    </div>
  </div>

  <div class="page-section" id="page-past">
    <div id="past-drafts-container"></div>
  </div>
</main>

<script>
  const PICKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=1137257969&single=true&output=csv";

  // Tab Logic
  document.querySelectorAll('.page-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      tab.classList.add('active');
      const target = document.getElementById('page-' + tab.dataset.page);
      target.classList.add('active');

      if (tab.dataset.page === 'picks') renderPicksTable();
    });
  });

  async function renderPicksTable() {
    const container = document.getElementById('picks-container');
    try {
      const res = await fetch(PICKS_URL);
      const text = await res.text();
      const rows = text.split('\n').map(r => r.split(',').map(x => x.trim())).slice(1);

      const TEAMS_DATA = rows.map(r => ({
        team: r[0],
        picks: { S2FRP: r[1], S2SRP: r[2], S2TRP: r[3], S3FRP: r[4], S3SRP: r[5], S3TRP: r[6] }
      }));

      function formatOwnership(value, teamName) {
        if (!value) return "—";
        value = value.toLowerCase();
        if (value === "y") return teamName;
        if (value.startsWith("y +")) return `${teamName}, ${value.replace("y +", "").trim()}`;
        if (value.startsWith("+")) return value.replace("+", "").trim();
        return value;
      }

      container.innerHTML = `
        <div class="picks-season">
          <div class="picks-season-title">Future Draft Pick Ownership</div>
          <div class="picks-wrap">
            <table class="picks-table">
              <thead>
                <tr>
                  <th>Team</th>
                  <th>S2 FRP</th><th>S2 SRP</th><th>S2 TRP</th>
                  <th>S3 FRP</th><th>S3 SRP</th><th>S3 TRP</th>
                </tr>
              </thead>
              <tbody>
                ${TEAMS_DATA.map(t => `
                  <tr>
                    <td style="font-weight:bold;">${t.team}</td>
                    <td>${formatOwnership(t.picks.S2FRP, t.team)}</td>
                    <td>${formatOwnership(t.picks.S2SRP, t.team)}</td>
                    <td>${formatOwnership(t.picks.S2TRP, t.team)}</td>
                    <td>${formatOwnership(t.picks.S3FRP, t.team)}</td>
                    <td>${formatOwnership(t.picks.S3SRP, t.team)}</td>
                    <td>${formatOwnership(t.picks.S3TRP, t.team)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    } catch (e) {
      container.innerHTML = `<p style="color:red;">Error loading picks: ${e.message}</p>`;
    }
  }
</script>
</body>
</html>
