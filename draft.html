<script>
const PICKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=1137257969&single=true&output=csv";

/* =======================
   TAB SYSTEM
======================= */
document.querySelectorAll('.page-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));

    tab.classList.add('active');
    const page = document.getElementById('page-' + tab.dataset.page);
    page.classList.add('active');

    if (tab.dataset.page === 'picks') renderPicksTable();
    if (tab.dataset.page === 'past') renderPastDraft();
  });
});

/* =======================
   CURRENT DRAFT (SIMPLE CORE)
======================= */

const supabaseClient = supabase.createClient(
  "https://orreqxjbzqcjrzuazpco.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycmVxeGpienFjanJ6dWF6cGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjU0OTYsImV4cCI6MjA4OTgwMTQ5Nn0.Ew5tD42tqmNMa0Ctf14QoD9UFI1ElGE-Zk0cCdwAoVE"
);

let draftPicks = {};

async function loadPicks() {
  const { data } = await supabaseClient
    .from('draft_picks_board')
    .select('pick_num, player, team, round');

  draftPicks = {};
  (data || []).forEach(p => {
    draftPicks[p.pick_num] = p.player;
  });

  renderBoard();
}

function renderBoard() {
  const el = document.getElementById('draft-board');

  const rounds = 7;
  const teams = 12;

  let html = "";

  for (let r = 1; r <= rounds; r++) {
    html += `<div class="round-title">Round ${r}</div><div class="pick-list">`;

    for (let i = 1; i <= teams; i++) {
      const pickNum = (r - 1) * teams + i;
      const player = draftPicks[pickNum];

      html += `
        <div class="pick-row ${player ? "filled" : ""}">
          <div class="pick-num">${pickNum}</div>
          <div class="pick-team">Pick ${pickNum}</div>
          <div class="pick-player">
            ${player ? player : `<span class="pick-empty">—</span>`}
          </div>
        </div>
      `;
    }

    html += `</div>`;
  }

  el.innerHTML = html;
}

/* =======================
   DRAFT PICKS TABLE (YOUR SYSTEM)
======================= */

async function renderPicksTable() {
  const container = document.getElementById('picks-container');

  try {
    const res = await fetch(PICKS_URL);
    const text = await res.text();

    const rows = text
      .split('\n')
      .map(r => r.split(',').map(x => x.trim()))
      .slice(1);

    const TEAMS_DATA = rows.map(r => ({
      team: r[0],
      picks: {
        S2FRP: r[1], S2SRP: r[2], S2TRP: r[3],
        S3FRP: r[4], S3SRP: r[5], S3TRP: r[6]
      }
    }));

    function formatOwnership(value, teamName) {
      if (!value) return "—";
      value = value.toLowerCase();
      if (value === "y") return teamName;
      if (value.startsWith("y +")) return `${teamName}, ${value.replace("y +", "").trim()}`;
      if (value.startsWith("+")) return value.replace("+", "").trim();
      return value;
    }

    container.innerHTML = `
      <div class="picks-season">
        <div class="picks-season-title">Draft Pick Ownership</div>
        <div class="picks-wrap">
          <table class="picks-table">
            <thead>
              <tr>
                <th>Team</th>
                <th>S2 FRP</th><th>S2 SRP</th><th>S2 TRP</th>
                <th>S3 FRP</th><th>S3 SRP</th><th>S3 TRP</th>
              </tr>
            </thead>
            <tbody>
              ${TEAMS_DATA.map(t => `
                <tr>
                  <td>${t.team}</td>
                  <td>${formatOwnership(t.picks.S2FRP, t.team)}</td>
                  <td>${formatOwnership(t.picks.S2SRP, t.team)}</td>
                  <td>${formatOwnership(t.picks.S2TRP, t.team)}</td>
                  <td>${formatOwnership(t.picks.S3FRP, t.team)}</td>
                  <td>${formatOwnership(t.picks.S3SRP, t.team)}</td>
                  <td>${formatOwnership(t.picks.S3TRP, t.team)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;

  } catch (e) {
    container.innerHTML = `<p style="color:red;">Error loading: ${e.message}</p>`;
  }
}

/* =======================
   PAST DRAFT (optional stub)
======================= */
async function renderPastDraft() {
  document.getElementById('past-drafts-container').innerHTML =
    `<p style="color:var(--muted);text-align:center;">No past drafts loaded yet.</p>`;
}

/* INIT */
loadPicks();
</script>
