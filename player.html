<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Player Profile — Karma Rank League</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "DM Sans", sans-serif;
  background: #06070b;
  color: #fff;
}

/* TOP BAR */
header {
  padding: 30px 20px;
  text-align: center;
  border-bottom: 1px solid #1c2130;
}

header h1 {
  font-family: "Bebas Neue";
  font-size: 52px;
  margin: 0;
  letter-spacing: 2px;
}

header span {
  color: #e8ff3c;
}

/* SEARCH */
.search {
  max-width: 500px;
  margin: 20px auto;
  padding: 0 16px;
}

.search input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #1c2130;
  background: #10131a;
  color: white;
  font-size: 14px;
}

/* LIST */
.container {
  max-width: 700px;
  margin: auto;
  padding: 10px 16px 60px;
}

.player {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #10131a;
  border: 1px solid #1c2130;
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.player:hover {
  border-color: #e8ff3c;
  transform: translateY(-2px);
}

.name {
  font-weight: 700;
}

.team {
  font-size: 12px;
  color: #7b8092;
}

.rank {
  font-weight: 700;
  color: #e8ff3c;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-content {
  width: 100%;
  max-width: 600px;
  background: #10131a;
  border: 1px solid #1c2130;
  border-radius: 16px;
  padding: 20px;
}

.close {
  float: right;
  background: transparent;
  border: 1px solid #1c2130;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* PROFILE */
.p-name {
  font-family: "Bebas Neue";
  font-size: 34px;
  color: #e8ff3c;
}

.p-team {
  color: #7b8092;
  margin-bottom: 14px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 15px;
}

.box {
  background: #06070b;
  border: 1px solid #1c2130;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.box h3 {
  font-size: 10px;
  color: #7b8092;
  margin: 0;
  text-transform: uppercase;
}

.box p {
  font-size: 18px;
  font-weight: 700;
  margin: 5px 0 0;
}

.ranks {
  margin-top: 15px;
  max-height: 220px;
  overflow: auto;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #1c2130;
  font-size: 13px;
}
</style>
</head>

<body>

<header>
  <h1>Player <span>Profiles</span></h1>
</header>

<div class="search">
  <input id="search" placeholder="Search player..." />
</div>

<div class="container" id="list"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close" onclick="closeModal()">X</button>
    <div id="profile"></div>
  </div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

let PLAYERS = [];

/* CSV PARSER */
function parseCSV(text){
  const rows = [];
  let row=[],val="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c=='"'){q=!q;continue;}
    if(c==","&&!q){row.push(val);val="";continue;}
    if((c=="\n")&&!q){row.push(val);rows.push(row);row=[];val="";continue;}
    val+=c;
  }
  row.push(val);rows.push(row);
  return rows;
}

/* LOAD SHEET */
async function load(){
  const res = await fetch(URL);
  const text = await res.text();
  const rows = parseCSV(text).slice(1);

  PLAYERS = rows.map(r=>{
    const name = r[0];
    const team = r[1];
    const ranks = r.slice(2).map(x=>parseFloat(x)).filter(x=>!isNaN(x));

    return {
      name,
      team,
      ranks,
      avg: ranks.length ? (ranks.reduce((a,b)=>a+b,0)/ranks.length).toFixed(1) : "-"
    };
  });

  renderList();
}

/* LIST */
function renderList(){
  const list = document.getElementById("list");
  const q = document.getElementById("search").value?.toLowerCase() || "";

  list.innerHTML = PLAYERS
    .filter(p=>p.name.toLowerCase().includes(q))
    .map(p=>`
      <div class="player" onclick="openProfile('${p.name}')">
        <div>
          <div class="name">${p.name}</div>
          <div class="team">${p.team}</div>
        </div>
        <div class="rank">${p.avg}</div>
      </div>
    `).join("");
}

/* PROFILE */
function openProfile(name){
  const p = PLAYERS.find(x=>x.name===name);
  if(!p) return;

  document.getElementById("profile").innerHTML = `
    <div class="p-name">${p.name}</div>
    <div class="p-team">${p.team}</div>

    <div class="stats">
      <div class="box"><h3>AVG</h3><p>${p.avg}</p></div>
      <div class="box"><h3>BEST</h3><p>${Math.min(...p.ranks)}</p></div>
      <div class="box"><h3>GAMES</h3><p>${p.ranks.length}</p></div>
    </div>

    <div class="ranks">
      ${p.ranks.map((r,i)=>`
        <div class="row">
          <span>Game ${i+1}</span>
          <span>${r}</span>
        </div>
      `).join("")}
    </div>
  `;

  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input", renderList);

load();
</script>

</body>
</html>
