<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League - Player Stats</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    background:#050505;
    color:white;
    font-family:'DM Sans',sans-serif;
}

h1{
    text-align:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:58px;
    color:#00e5ff;
}

input{
    display:block;
    margin:0 auto 20px auto;
    width:320px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0d0d0d;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    color:#00e5ff;
}

tr:hover{
    background:#151515;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>PLAYER STATS</h1>

<input id="searchBar" placeholder="Search player..." onkeyup="searchPlayers()">

<table>
<thead>
<tr>
<th>User</th>
<th>Team</th>
<th>Avg</th>
<th>GP</th>
<th>UNR</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

let players=[];

function parseCSV(text){
    const rows=[];let r=[],v="",q=false;
    for(let i=0;i<text.length;i++){
        const c=text[i],n=text[i+1];
        if(c=='"'){q=!q;continue;}
        if(c==','&&!q){r.push(v);v="";continue;}
        if((c=='\n'||c=='\r')&&!q){
            if(v||r.length){r.push(v);rows.push(r);r=[];v="";}
            continue;
        }
        v+=c;
    }
    if(v||r.length) rows.push([...r,v]);
    return rows;
}

function calc(arr){
    const nums=arr.filter(x=>typeof x==="number");
    const unr=arr.filter(x=>x==="UNR").length;
    const avg=nums.length?nums.reduce((a,b)=>a+b,0)/nums.length:0;
    return{avg,gp:arr.length,unr};
}

async function load(){
    const res=await fetch(CSV_URL);
    const data=parseCSV(await res.text());

    players=[];

    for(let i=1;i<data.length;i++){
        const row=data[i];

        const username=(row[0]||"").trim(); // A
        const team=(row[1]||"").trim();     // B

        // ✅ ONLY C+ IS GAMES
        const games=row.slice(2).map(g=>{
            g=(g||"").trim();
            if(g==="") return null;
            if(g.toUpperCase()==="UNR") return "UNR";
            const n=parseFloat(g);
            return isNaN(n)?null:n;
        }).filter(g=>g!==null);

        if(!username) continue;

        const stats=calc(games);

        players.push({
            username,
            team,
            games,
            avg:stats.avg.toFixed(1),
            gp:stats.gp,
            unr:stats.unr
        });
    }

    render(players);
}

function render(list){
    const body=document.getElementById("body");
    body.innerHTML="";

    list.forEach(p=>{
        const tr=document.createElement("tr");

        tr.innerHTML=`
            <td>${p.username}</td>
            <td>${p.team}</td>
            <td>${p.avg}</td>
            <td>${p.gp}</td>
            <td>${p.unr}</td>
        `;

        tr.onclick=()=>location.href="profile.html?player="+encodeURIComponent(p.username);

        body.appendChild(tr);
    });
}

function searchPlayers(){
    const v=document.getElementById("searchBar").value.toLowerCase();
    render(players.filter(p=>p.username.toLowerCase().includes(v)));
}

load();
</script>

</body>
</html>
