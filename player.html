<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League - Player Stats</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    background:#050505;
    color:white;
    font-family:'DM Sans',sans-serif;
}

h1{
    text-align:center;
    font-family:'Bebas Neue';
    font-size:58px;
    color:#00e5ff;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0d0d0d;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{ color:#00e5ff; background:#111; }
tr:hover{ background:#151515; cursor:pointer; }
</style>
</head>
<body>

<h1>PLAYER STATS</h1>

<table id="table">
<thead>
<tr>
<th>User</th>
<th>Team</th>
<th>Avg</th>
<th>GP</th>
<th>UNR</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

let players = [];

function parseCSV(text){
    const rows = [];
    let row=[],val="",q=false;

    for(let i=0;i<text.length;i++){
        const c=text[i],n=text[i+1];

        if(c=='"'){ q=!q; continue; }

        if(c=="," && !q){ row.push(val); val=""; continue; }

        if((c=="\n"||c=="\r") && !q){
            if(val || row.length){ row.push(val); rows.push(row); row=[]; val=""; }
            continue;
        }

        val+=c;
    }

    if(val||row.length){ row.push(val); rows.push(row); }
    return rows;
}

function load(){
fetch(csvURL)
.then(r=>r.text())
.then(t=>{
const data=parseCSV(t);

players=[];

for(let i=1;i<data.length;i++){
const r=data[i];

const username=r[0]?.trim();
const team=r[1]?.trim();

// ONLY C+
const gamesRaw=r.slice(3);

let games=[];
let unr=0;

gamesRaw.forEach(g=>{
g=(g||"").trim();

if(g==="") return;          // ❌ blank = ignore
if(g==="UNR"){ unr++; games.push("UNR"); return; }

let n=parseFloat(g);
if(!isNaN(n)) games.push(n);
});

let nums=games.filter(g=>typeof g==="number");

players.push({
username,
team,
games,
gp: games.length,
unr,
avg: nums.length ? (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1) : "-"
});
}

render(players);
});
}

function render(data){
const tbody=document.querySelector("tbody");
tbody.innerHTML="";

data.forEach(p=>{
tbody.innerHTML+=`
<tr>
<td>${p.username}</td>
<td>${p.team}</td>
<td>${p.avg}</td>
<td>${p.gp}</td>
<td>${p.unr}</td>
</tr>`;
});
}

load();
</script>

</body>
</html>
