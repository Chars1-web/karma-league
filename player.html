<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League - Player Stats</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:'DM Sans',sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    font-family:'Bebas Neue',sans-serif;
    font-size:56px;
    letter-spacing:2px;
    color:#00e5ff;
    margin-bottom:20px;
}

#searchBar{
    display:block;
    margin:0 auto 20px auto;
    width:300px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#111;
    color:white;
    outline:none;
}

.sort-buttons{
    text-align:center;
    margin-bottom:20px;
}

.sort-buttons button{
    margin:5px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#0d0d0d;
    box-shadow:0 0 15px rgba(0,229,255,.15);
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    color:#00e5ff;
    font-size:18px;
}

tr:hover{
    background:#141414;
    cursor:pointer;
}

.player-card{
    margin-top:30px;
    background:#0d0d0d;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,229,255,.2);
    display:none;
}

.player-card h2{
    color:#00e5ff;
    margin-top:0;
}

.game-list{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
}

.game-box{
    background:#111;
    padding:8px 12px;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>PLAYER STATS</h1>

<input type="text" id="searchBar" placeholder="Search Username..." onkeyup="searchPlayers()">

<div class="sort-buttons">
    <button onclick="sortPlayers('team')">Sort Team</button>
    <button onclick="sortPlayers('avg')">Sort Avg Rank</button>
    <button onclick="sortPlayers('gp')">Sort GP</button>
    <button onclick="sortPlayers('median')">Sort REL Median</button>
    <button onclick="sortPlayers('mode')">Sort Mode</button>
</div>

<table id="statsTable">
    <thead>
        <tr>
            <th>Username</th>
            <th>Team</th>
            <th>Avg Rank</th>
            <th>GP</th>
            <th>REL Median</th>
            <th>Mode</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="player-card" id="playerCard"></div>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

let players = [];

function parseCSV(text){
    const rows = [];
    let row = [], value = "", inQuotes = false;

    for(let i=0;i<text.length;i++){
        const char = text[i];
        const next = text[i+1];

        if(char === '"'){
            if(inQuotes && next === '"'){
                value += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if(char === ',' && !inQuotes){
            row.push(value);
            value = "";
        } else if((char === '\n' || char === '\r') && !inQuotes){
            if(value || row.length){
                row.push(value);
                rows.push(row);
                row = [];
                value = "";
            }
        } else {
            value += char;
        }
    }
    if(value || row.length){
        row.push(value);
        rows.push(row);
    }
    return rows;
}

function average(arr){
    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function median(arr){
    let sorted = [...arr].sort((a,b)=>a-b);
    let mid = Math.floor(sorted.length/2);
    return sorted.length%2!==0 ? sorted[mid] : ((sorted[mid-1]+sorted[mid])/2).toFixed(1);
}

function mode(arr){
    let freq = {};
    let max = 0;
    let result = arr[0];

    arr.forEach(n=>{
        freq[n]=(freq[n]||0)+1;
        if(freq[n]>max){
            max=freq[n];
            result=n;
        }
    });
    return result;
}

async function loadStats(){
    const res = await fetch(csvURL);
    const text = await res.text();
    const data = parseCSV(text);

    players = [];

    for(let i=1;i<data.length;i++){ // skip row 1
        const row = data[i];
        const username = row[0];
        const team = row[1];

        const gameRanks = row.slice(2)
            .map(x=>parseFloat(x))
            .filter(x=>!isNaN(x));

        if(!username) continue;

        players.push({
            username,
            team,
            games: gameRanks,
            avg: gameRanks.length ? average(gameRanks).toFixed(1) : "-",
            gp: gameRanks.length,
            median: gameRanks.length ? median(gameRanks) : "-",
            mode: gameRanks.length ? mode(gameRanks) : "-",
            best: gameRanks.length ? Math.min(...gameRanks) : "-",
            worst: gameRanks.length ? Math.max(...gameRanks) : "-"
        });
    }

    renderTable(players);
}

function renderTable(data){
    const tbody = document.querySelector("#statsTable tbody");
    tbody.innerHTML = "";

    data.forEach(player=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${player.username}</td>
            <td>${player.team}</td>
            <td>${player.avg}</td>
            <td>${player.gp}</td>
            <td>${player.median}</td>
            <td>${player.mode}</td>
        `;
        tr.onclick = ()=>showPlayer(player);
        tbody.appendChild(tr);
    });
}

function sortPlayers(type){
    if(type==="team") players.sort((a,b)=>a.team.localeCompare(b.team));
    if(type==="avg") players.sort((a,b)=>a.avg-b.avg);
    if(type==="gp") players.sort((a,b)=>b.gp-a.gp);
    if(type==="median") players.sort((a,b)=>a.median-b.median);
    if(type==="mode") players.sort((a,b)=>a.mode-b.mode);

    renderTable(players);
}

function searchPlayers(){
    const val = document.getElementById("searchBar").value.toLowerCase();
    const filtered = players.filter(p=>p.username.toLowerCase().includes(val));
    renderTable(filtered);
}

function showPlayer(player){
    const card = document.getElementById("playerCard");
    card.style.display = "block";

    card.innerHTML = `
        <h2>${player.username}</h2>
        <p><strong>Team:</strong> ${player.team}</p>
        <p><strong>Avg Rank:</strong> ${player.avg}</p>
        <p><strong>Games Played:</strong> ${player.gp}</p>
        <p><strong>Best Rank:</strong> ${player.best}</p>
        <p><strong>Worst Rank:</strong> ${player.worst}</p>
        <p><strong>REL Median:</strong> ${player.median}</p>
        <p><strong>Mode:</strong> ${player.mode}</p>
        <h3>Game History</h3>
        <div class="game-list">
            ${player.games.map((g,i)=>`<div class="game-box">G${i+1}: ${g}</div>`).join("")}
        </div>
    `;
}

loadStats();
</script>

</body>
</html>
