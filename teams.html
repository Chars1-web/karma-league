<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascended Karma League – Teams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508; --card: #13131c; --border: #1e1e2e;
      --accent: #e8ff3c; --accent2: #ff3c6e; --text: #f0f0f0; --muted: #6b6b80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(232,255,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,60,0.03) 1px,transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    header { position: relative; z-index: 1; padding: 40px 24px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px,8vw,72px); letter-spacing: 0.04em; line-height: 1; }
    h1 span { color: var(--accent); }
    main { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 32px 16px 80px; }

/* Team selector */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 28px; }
.team-chip {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; text-align: center; cursor: pointer; transition: all 0.2s;
  font-size: 13px; font-weight: 700;
}
.team-chip:hover { border-color: rgba(232,255,60,0.3); transform: translateY(-1px); }
.team-chip.active { border-color: var(--accent); background: rgba(232,255,60,0.08); color: var(--accent); }
.conf-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }

/* Team profile */
#team-profile { display: none; }

.profile-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 28px 24px; margin-bottom: 20px;
}
.team-name-big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.04em; line-height: 1; margin-bottom: 6px; }
.team-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
.meta-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 99px; padding: 4px 12px;
}
.meta-badge.conf { background: rgba(232,255,60,0.1); border: 1px solid rgba(232,255,60,0.25); color: var(--accent); }
.meta-badge.record { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); }
.meta-badge.seed { background: rgba(160,100,255,0.1); border: 1px solid rgba(160,100,255,0.3); color: #a064ff; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.05em; margin-bottom: 12px; }

/* Roster list */
.roster-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.player-row {
  display: flex; align-items: center; gap: 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px;
  cursor: pointer; transition: border-color 0.15s, transform 0.15s;
  text-decoration: none; color: var(--text);
}
.player-row:hover { border-color: rgba(232,255,60,0.3); transform: translateX(3px); }
.player-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(232,255,60,0.08); border: 1px solid rgba(232,255,60,0.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); flex-shrink: 0;
}
.player-info { flex: 1; }
.player-username { font-weight: 700; font-size: 14px; }
.player-avg { font-size: 12px; color: var(--muted); margin-top: 2px; }
.player-arrow { color: var(--muted); font-size: 16px; }

/* Standings link */
.standings-link {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; text-decoration: none; color: var(--text);
  transition: border-color 0.2s; margin-bottom: 20px;
}
.standings-link:hover { border-color: var(--accent); }
.standings-link-text { font-weight: 700; font-size: 14px; }
.standings-link-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.standings-link-arrow { color: var(--accent); font-size: 18px; }

.spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }

footer { position: relative; z-index: 1; text-align: center; padding: 0 0 40px; }
.home-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text); text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border); background: var(--card); padding: 10px 22px; border-radius: 10px; transition: border-color 0.2s, background 0.2s; }
.home-link:hover { border-color: var(--accent); background: rgba(232,255,60,0.06); color: var(--accent); }

<body>
<header>
  <div class="eyebrow">League Teams</div>
  <h1>Ascended <span>Karma</span> League</h1>
</header>

<main>
  <div id="team-selector">
    <p class="loading-msg"><span class="spinner"></span> Loading…</p>
  </div>
  <div id="team-profile"></div>
</main>

<footer><a href="index.html" class="home-link">← Home</a></footer>

<script>
  const ROSTER_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?gid=0&single=true&output=csv';
  const STATS_URL  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQD7bRadjfCTXPj6MBuUz14arjdGzfSTISy9fnMUsaWp6FeLe7UrY2Igd7fEr2KwFtfe-FlEKUv4Jc0/pub?gid=1930981544&single=true&output=csv';

  const CONFERENCES = {
    northern: ['Firebirds','Lightning','Polar Bears','Crusaders','Bullets','Martians','Wolves','Karma Chefs','Daggers','Titans'],
    southern: ['Methsters','Ascended','Bloodhawks','Stars','Dubs','Vampires','Thunder','Tourists','Dogs','Falcons']
  };

  const RECORDS = {
    'Firebirds':   {w:1,l:4}, 'Lightning':   {w:3,l:2}, 'Polar Bears': {w:1,l:5},
    'Crusaders':   {w:5,l:0}, 'Bullets':     {w:3,l:3}, 'Martians':    {w:3,l:2},
    'Wolves':      {w:3,l:2}, 'Karma Chefs': {w:0,l:6}, 'Daggers':     {w:3,l:2},
    'Titans':      {w:3,l:3}, 'Methsters':   {w:1,l:4}, 'Ascended':    {w:4,l:2},
    'Bloodhawks':  {w:4,l:2}, 'Stars':       {w:3,l:2}, 'Dubs':        {w:5,l:1},
    'Vampires':    {w:0,l:6}, 'Thunder':     {w:5,l:0}, 'Tourists':    {w:2,l:4},
    'Dogs':        {w:3,l:3}, 'Falcons':     {w:3,l:2},
  };

  const TEAM_NAMES_SET = new Set([
    'ASCENDED','BLOODHAWKS','BULLETS','CRUSADERS','DAGGERS','DOGS','DUBS',
    'FALCONS','FIREBIRDS','KARMA CHEFS','LIGHTNING','MARTIANS','METHSTERS',
    'POLAR BEARS','STARS','THUNDER','TITANS','TOURISTS','VAMPIRES','WOLVES'
  ]);

  let rosterMap  = {}; // { teamName: [username, ...] }
  let statsMap   = {}; // { username: { avg, gp, unr } }
  let currentTeam = null;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function parseCSV(text) {
    const rows = []; let row = [], val = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], n = text[i+1];
      if (c === '"') { if (inQ && n === '"') { val += '"'; i++; } else inQ = !inQ; continue; }
      if (c === ',' && !inQ) { row.push(val.trim()); val = ''; continue; }
      if ((c === '\n' || c === '\r') && !inQ) {
        if (c === '\r' && n === '\n') i++;
        row.push(val.trim());
        if (row.some(x => x)) rows.push(row);
        row = []; val = ''; continue;
      }
      val += c;
    }
    if (val || row.length) { row.push(val.trim()); rows.push(row); }
    return rows;
  }

  function getConference(team) {
    if (CONFERENCES.northern.includes(team)) return 'Northern';
    if (CONFERENCES.southern.includes(team)) return 'Southern';
    return '';
  }

  function getSeed(team) {
    const conf = getConference(team);
    const list = conf === 'Northern' ? CONFERENCES.northern : CONFERENCES.southern;
    const rec = RECORDS[team];
    if (!rec) return null;
    const sorted = list
      .filter(t => RECORDS[t])
      .sort((a,b) => {
        const pa = RECORDS[a].w / (RECORDS[a].w + RECORDS[a].l || 1);
        const pb = RECORDS[b].w / (RECORDS[b].w + RECORDS[b].l || 1);
        return pb - pa;
      });
    return sorted.indexOf(team) + 1;
  }

  async function loadData() {
    const [rosterRes, statsRes] = await Promise.all([
      fetch(ROSTER_URL, { cache: 'no-store' }),
      fetch(STATS_URL,  { cache: 'no-store' }),
    ]);
    const rosterRows = parseCSV(await rosterRes.text());
    const statsRows  = parseCSV(await statsRes.text());

    // Build rosterMap: col A = username, col C = team (lowercase)
    rosterRows.slice(1).forEach(r => {
      const username = (r[0]||'').trim();
      const team = (r[2]||'').trim();
      if (!username || !team) return;
      // Normalize team name to title case
      const key = team.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
      if (!rosterMap[key]) rosterMap[key] = [];
      rosterMap[key].push(username);
    });

    // Build statsMap from stats sheet
    const headerRow = statsRows[0] || [];
    const gameCount = headerRow.slice(1).filter(c => c.toLowerCase().startsWith('game')).length || 20;
    let curTeam = '';
    const allPlayers = [];
    statsRows.forEach(row => {
      if (!row.length || !row[0]) return;
      const first = row[0].trim();
      if (TEAM_NAMES_SET.has(first.toUpperCase())) {
        curTeam = first.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        return;
      }
      if (!first.startsWith('@')) return;
      const games = row.slice(1, 1 + gameCount).map(g => g.trim());
      allPlayers.push({ username: first, team: curTeam, games });
    });

    allPlayers.forEach(p => {
      const played = p.games.filter(g => g && g.toLowerCase() !== 'n/a');
      const nums = played.map(g => g.toLowerCase() === 'unr' ? 1000 : parseFloat(g)).filter(n => !isNaN(n));
      const avg = nums.length ? nums.reduce((a,b) => a+b,0) / nums.length : null;
      statsMap[p.username] = { gp: played.length, avg, unr: played.filter(g => g.toLowerCase() === 'unr').length };
    });

    renderSelector();
  }

  function renderSelector() {
    const sel = document.getElementById('team-selector');
    const confs = [
      { label: 'Northern Conference', teams: CONFERENCES.northern },
      { label: 'Southern Conference', teams: CONFERENCES.southern },
    ];
    sel.innerHTML = confs.map(c => `
      <div class="conf-label">${c.label}</div>
      <div class="team-grid">
        ${c.teams.map(t => `
          <div class="team-chip" data-team="${esc(t)}" onclick="showTeam('${esc(t)}')">${esc(t)}</div>
        `).join('')}
      </div>`).join('');

    // Check URL param
    const params = new URLSearchParams(window.location.search);
    const t = params.get('team');
    if (t) showTeam(decodeURIComponent(t));
  }

  function showTeam(team) {
    currentTeam = team;
    // Update URL
    history.replaceState(null, '', '?team=' + encodeURIComponent(team));

    // Highlight chip
    document.querySelectorAll('.team-chip').forEach(c => c.classList.toggle('active', c.dataset.team === team));

    const rec = RECORDS[team] || {w:0,l:0};
    const conf = getConference(team);
    const seed = getSeed(team);
    const players = rosterMap[team] || [];
    const pct = rec.w + rec.l > 0 ? (rec.w / (rec.w + rec.l) * 100).toFixed(0) : 0;

    // Team avg rank
    const playerStats = players.map(u => statsMap[u]).filter(Boolean);
    const teamAvgs = playerStats.map(s => s.avg).filter(a => a !== null);
    const teamAvg = teamAvgs.length ? (teamAvgs.reduce((a,b) => a+b,0) / teamAvgs.length).toFixed(1) : '—';

    const profile = document.getElementById('team-profile');
    profile.style.display = 'block';

    profile.innerHTML = `
      <div class="profile-card">
        <div class="team-name-big">${esc(team)}</div>
        <div class="team-meta">
          <span class="meta-badge conf">${conf} Conference</span>
          <span class="meta-badge record">${rec.w} — ${rec.l}</span>
          ${seed ? `<span class="meta-badge seed">${seed}${seed===1?'st':seed===2?'nd':seed===3?'rd':'th'} Seed</span>` : ''}
        </div>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-val">${rec.w}</div>
            <div class="stat-label">Wins</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${rec.l}</div>
            <div class="stat-label">Losses</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${teamAvg}</div>
            <div class="stat-label">Team Avg Rank</div>
          </div>
        </div>

        <a href="standingss.html" class="standings-link">
          <div>
            <div class="standings-link-text">View Full Standings</div>
            <div class="standings-link-sub">${conf} Conference · ${seed ? seed + (seed===1?'st':seed===2?'nd':seed===3?'rd':'th') + ' seed' : ''}</div>
          </div>
          <span class="standings-link-arrow">→</span>
        </a>

        <div class="section-title">Roster</div>
        <div class="roster-list">
          ${players.length ? players.map(u => {
            const s = statsMap[u];
            return `<a href="profile.html?player=${encodeURIComponent(u)}" class="player-row">
              <div class="player-avatar">${esc(u.replace('@','').slice(0,2).toUpperCase())}</div>
              <div class="player-info">
                <div class="player-username">${esc(u)}</div>
                <div class="player-avg">${s ? `GP: ${s.gp} · Avg Rank: ${s.avg !== null ? s.avg.toFixed(1) : '—'}` : 'No stats yet'}</div>
              </div>
              <span class="player-arrow">→</span>
            </a>`;
          }).join('') : '<p style="color:var(--muted);font-size:13px;">No players found.</p>'}
        </div>
      </div>`;

    profile.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  loadData().catch(e => {
    document.getElementById('team-selector').innerHTML = `<p class="loading-msg">Failed to load: ${esc(e.message)}</p>`;
  });
</script>

</body>
</html>
