<head>
  <title>Ascended Karma League</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 60px;
    }
    .box {
      background: #111;
      color: white;
      border: 3px solid white;
      border-radius: 20px;
      padding: 70px 50px;
      margin: 30px 0;
      width: 300px;
      font-size: 36px;
      font-weight: bold;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
    }
    .box:hover {
      background: white;
      color: black;
      cursor: pointer;
    }
    footer {
      margin-top: auto; /* pushes it to the bottom */
      font-size: 18px;
      color: #aaa;
      padding: 20px 0;
    }
  </style>
