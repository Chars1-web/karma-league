<!DOCTYPE html>

<html>
<head>
  <title>Karma Rank League</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 60px;
    }
    .box {
      background: #111;
      color: white;
      border: 3px solid white;
      border-radius: 20px;
      padding: 70px 50px;
      margin: 30px 0;
      width: 300px;
      font-size: 36px;
      font-weight: bold;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
    }
    .box:hover {
      background: white;
      color: black;
      cursor: pointer;
    }
    .spacer {
      flex: 1;
    }
    .box-small {
      background: #111;
      color: white;
      border: 2px solid white;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .box-small:hover {
      background: white;
      color: black;
      cursor: pointer;
    }
    footer {
      font-size: 18px;
      color: #aaa;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <h1>Karma Rank League</h1>


<a href="draft.html" class="box">Draft Captial</a>
<a href="standings.html" class="box">Standings</a>

  <div class="spacer"></div>


<a href="gm.html" class="box-small">GM Login</a>

  <footer>Made by @chars1</footer>

</body>
</html>
