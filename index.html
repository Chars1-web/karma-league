<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px; /* smaller top padding */
      display: flex;
      flex-direction: column;
      justify-content: flex-start; /* move everything to the top */
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 60px; /* bigger title */
      margin-bottom: 60px; /* space below title */
    }
    .box {
      background: #111;
      color: white;
      border: 3px solid white; /* slightly thicker border */
      border-radius: 20px;
      padding: 70px 50px; /* bigger, taller boxes */
      margin: 30px 0;
      width: 300px; /* wider boxes */
      font-size: 36px; /* bigger text */
      font-weight: bold;
      text-decoration: none;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
    }
    .box:hover {
      background: white;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Ascended Karma League</h1>

<a href="live.html" class="box">Live Scores</a>
<a href="standings.html" class="box">Standings</a>
<a href="rosters.html" class="box">Rosters</a>

</body>
</html>
