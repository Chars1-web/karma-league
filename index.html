<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#040508;
--bg2:#0b0d14;
--card:#11141d;
--border:#1e2431;
--accent:#e8ff3c;
--gold:#ffd95c;
--text:#f5f5f5;
--muted:#7f8598;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top center, rgba(232,255,60,.05), transparent 28%),
linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:32px 18px 24px;
overflow-x:hidden;
}

body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
background-size:34px 34px;
pointer-events:none;
}

.hero{
position:relative;
z-index:2;
text-align:center;
margin-bottom:38px;
}

.hero-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:12px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(64px,12vw,100px);
letter-spacing:.04em;
line-height:.95;
}

h1 span{color:var(--accent);}

.hero-sub{
margin-top:10px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

.nav-wrap{
position:relative;
z-index:2;
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
gap:16px;
}

.portal-box{
background:linear-gradient(to bottom, rgba(255,255,255,.015), rgba(255,255,255,.005));
border:1px solid var(--border);
border-radius:20px;
padding:28px 24px;
text-decoration:none;
color:var(--text);
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 12px 30px rgba(0,0,0,.22);
transition:.22s;
position:relative;
overflow:hidden;
}

.portal-box:before{
content:'';
position:absolute;
left:0;top:0;bottom:0;
width:4px;
background:var(--accent);
transform:scaleY(0);
transition:.22s;
}

.portal-box:hover{
transform:translateY(-3px);
border-color:rgba(232,255,60,.35);
box-shadow:0 16px 36px rgba(0,0,0,.3);
}

.portal-box:hover:before{
transform:scaleY(1);
}

.portal-left{
display:flex;
flex-direction:column;
align-items:flex-start;
}

.portal-title{
font-family:'Bebas Neue',sans-serif;
font-size:34px;
letter-spacing:.04em;
line-height:1;
}

.portal-sub{
font-size:11px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--muted);
margin-top:4px;
}

.portal-arrow{
font-size:24px;
color:var(--accent);
font-weight:800;
}

.spacer{
flex:1;
}

.gm-btn{
position:relative;
z-index:2;
margin-top:34px;
display:inline-block;
padding:12px 26px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
transition:.2s;
}

.gm-btn:hover{
border-color:rgba(232,255,60,.35);
color:var(--accent);
}

footer{
position:relative;
z-index:2;
margin-top:18px;
font-size:13px;
letter-spacing:.12em;
text-transform:uppercase;
color:var(--muted);
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-top">Official Fantasy Sports Network</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="hero-sub">Private League Portal</div>
</div>

<div class="nav-wrap">

<a href="live.html" class="portal-box">
  <div class="portal-left">
    <div class="portal-title">Live Scores</div>
    <div class="portal-sub">Official Match Center</div>
  </div>
  <div class="portal-arrow">→</div>
</a>

<a href="draft.html" class="portal-box">
  <div class="portal-left">
    <div class="portal-title">Draft Capital</div>
    <div class="portal-sub">Future Assets Tracker</div>
  </div>
  <div class="portal-arrow">→</div>
</a>

<a href="standings.html" class="portal-box">
  <div class="portal-left">
    <div class="portal-title">Standings</div>
    <div class="portal-sub">League Table & Rankings</div>
  </div>
  <div class="portal-arrow">→</div>
</a>

<a href="transactions.html" class="portal-box">
  <div class="portal-left">
    <div class="portal-title">Transactions</div>
    <div class="portal-sub">Trades, Adds & Drops</div>
  </div>
  <div class="portal-arrow">→</div>
</a>

</div>

<div class="spacer"></div>

<a href="gm.html" class="gm-btn">GM Login</a>

<footer>Made by @chars1</footer>

</body>
</html>
