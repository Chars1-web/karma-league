<body>
<header>
  <div class="eyebrow">Team Rosters</div>
  <h1>Karma <span>Rank</span> League</h1>
</header>

<main>
  <div id="roster-container">
    <p class="empty-msg"><span class="spinner"></span> Loading rosters…</p>
  </div>
</main>

<div id="player-modal" hidden>
  <div class="modal-card">
    <div class="modal-avatar" id="modal-avatar"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-team" id="modal-team"></div>
    <button class="modal-close" id="modal-close">Close</button>
  </div>
</div>

<footer><a href="index.html" class="home-link">← Home</a></footer>

<script>
  const ROSTER_URL = '/api/sheet?name=roster';

  function parseCSV(text) {
    const rows = []; let row = [], value = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const char = text[i], next = text[i+1];
      if (char === '"') { if (inQuotes && next === '"') { value += '"'; i++; } else inQuotes = !inQuotes; continue; }
      if (char === ',' && !inQuotes) { row.push(value.trim()); value = ''; continue; }
      if ((char === '\n' || char === '\r') && !inQuotes) {
        if (char === '\r' && next === '\n') i++;
        row.push(value.trim());
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = []; value = ''; continue;
      }
      value += char;
    }
    if (value.length || row.length) { row.push(value.trim()); rows.push(row); }
    return rows;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getInitials(name) {
    return String(name||'?').replace('@','').trim().split(/[\s._]/).map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function renderRosters(rows) {
    // Col A (index 0) = player name, Col C (index 2) = team, starting row 2 (index 1)
    const players = rows.slice(1)
      .map(r => ({ name: (r[0]||'').trim(), team: (r[2]||'').trim() }))
      .filter(p => p.name && p.team);

    const teams = {};
    players.forEach(p => {
      const key = p.team;
      if (!teams[key]) teams[key] = [];
      teams[key].push(p.name);
    });

    const teamNames = Object.keys(teams).sort();
    const container = document.getElementById('roster-container');

    if (!teamNames.length) {
      container.innerHTML = '<p class="empty-msg">No roster data found.</p>';
      return;
    }

    container.innerHTML = `
      <div class="field">
        <div class="section-label">Select Team</div>
        <select id="team-select">
          ${teamNames.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('')}
        </select>
      </div>
      <div id="team-display"></div>`;

    const sel = document.getElementById('team-select');
    const display = document.getElementById('team-display');

    function showTeam(team) {
      const roster = teams[team] || [];
      display.innerHTML = `
        <div class="team-header">${esc(team)}</div>
        <div class="player-grid">
          ${roster.map(name => `
            <div class="player-card" data-name="${esc(name)}" data-team="${esc(team)}">
              <div class="player-avatar">${esc(getInitials(name))}</div>
              <div class="player-name">${esc(name)}</div>
            </div>`).join('')}
        </div>`;

      display.querySelectorAll('.player-card').forEach(card => {
        card.addEventListener('click', () => {
          document.getElementById('modal-avatar').textContent = getInitials(card.dataset.name);
          document.getElementById('modal-name').textContent = card.dataset.name;
          document.getElementById('modal-team').textContent = card.dataset.team;
          document.getElementById('player-modal').hidden = false;
        });
      });
    }

    showTeam(teamNames[0]);
    sel.addEventListener('change', () => showTeam(sel.value));
  }

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('player-modal').hidden = true;
  });
  document.getElementById('player-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('player-modal')) document.getElementById('player-modal').hidden = true;
  });

  async function loadRoster() {
    try {
      const res = await fetch(ROSTER_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
      const rows = parseCSV(await res.text());
      if (!rows.length) throw new Error('No data found.');
      renderRosters(rows);
    } catch(e) {
      document.getElementById('roster-container').innerHTML = `<p class="empty-msg">Failed to load: ${esc(e.message)}</p>`;
    }
  }

  loadRoster();
</script>

</body>
</html>
