<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Rosters</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07080c;
  --card:#11131b;
  --border:#1d2230;
  --accent:#e8ff3c;
  --text:#f5f5f5;
  --muted:#8a8fa3;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  padding:30px 16px;
}

header{
  text-align:center;
  margin-bottom:30px;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:54px;
  letter-spacing:2px;
}

h1 span{color:var(--accent);}

.sub{
  color:var(--muted);
  font-size:13px;
  margin-top:6px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:14px;
  max-width:1100px;
  margin:auto;
}

/* team card */
.team{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

.team-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}

.team-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
}

.gm{
  font-size:11px;
  color:var(--accent);
  font-weight:700;
  letter-spacing:1px;
}

.player{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:13px;
}

.player:last-child{border-bottom:none;}

.username{
  font-weight:600;
}

.badge{
  font-size:11px;
  color:var(--muted);
}

.loading{
  text-align:center;
  color:var(--muted);
  margin-top:50px;
}

footer{
  text-align:center;
  margin-top:40px;
}

a{
  color:var(--text);
  text-decoration:none;
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:10px;
}
a:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>

<body>

<header>
  <h1>Karma <span>Rosters</span></h1>
  <div class="sub">Live team roster database (Google Sheets powered)</div>
</header>

<div id="roster" class="grid">
  <div class="loading">Loading rosters...</div>
</div>

<footer>
  <a href="index.html">← Home</a>
</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

const GMS = {
  "beasts": "@padgood",
  "la familia": "@corbin",
  "patriots": "@reinhart13",
  "artemis": "@ursaal",
  "stuntmen": "@sb",
  "predators": "@zo",
  "falcons": "@chars1",
  "triple t elite": "@burress",
  "reapers": "@duren",
  "wolves": "@pibster",
  "judy hopps fc": "@bain",
  "sour patch kids": "@f1"
};

function parseCSV(text){
  const rows = [];
  let row = [], val = "", q = false;

  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];

    if(c === '"'){
      if(q && n === '"'){ val += '"'; i++; }
      else q = !q;
    } else if(c === ',' && !q){
      row.push(val); val="";
    } else if((c === '\n' || c === '\r') && !q){
      if(val || row.length){
        row.push(val);
        rows.push(row);
        row=[]; val="";
      }
    } else {
      val += c;
    }
  }
  if(val || row.length){
    row.push(val);
    rows.push(row);
  }
  return rows;
}

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  let data = parseCSV(text);

  data = data.slice(1); // skip header

  const teams = {};

  data.forEach(r=>{
    const user = (r[0] || "").trim();
    const team = (r[1] || "").trim();

    if(!user || !team) return;

    if(!teams[team]) teams[team] = [];
    teams[team].push(user);
  });

  render(teams);
}

function render(teams){
  const container = document.getElementById("roster");
  container.innerHTML = "";

  Object.keys(teams).forEach(team=>{

    const gm = GMS[normalize(team)] || "—";

    const players = teams[team].map(p=>`
      <div class="player">
        <div class="username">${p}</div>
        <div class="badge">Player</div>
      </div>
    `).join("");

    container.innerHTML += `
      <div class="team">
        <div class="team-header">
          <div class="team-name">${team}</div>
          <div class="gm">GM ${gm}</div>
        </div>
        ${players}
      </div>
    `;
  });
}
function normalize(str){
  return (str || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g,' ');
}

load();
</script>

</body>
</html>
