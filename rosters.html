<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League - Rosters</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    body {
      background:#0a0a0a;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:20px;
    }

    h1 {
      font-size:48px;
      margin-bottom:30px;
    }

    select {
      font-size:24px;
      padding:10px;
      border-radius:10px;
      margin-bottom:30px;
    }

    .team-box {
      background:white;
      color:black;
      border-radius:15px;
      padding:20px;
      margin:0 auto;
      width:90%;
      max-width:400px;
      font-size:22px;
      display:none; /* hidden until a team is selected */
    }

    .team-name {
      font-weight:bold;
      font-size:28px;
      margin-bottom:15px;
    }

    .player {
      margin:5px 0;
    }

    .home-link {
      display:block;
      margin-top:40px;
      font-size:24px;
      border:2px solid white;
      padding:10px;
      width:180px;
      margin-left:auto;
      margin-right:auto;
      text-decoration:none;
      color:white;
    }
  </style>
</head>
<body>

<h1>League Rosters</h1>

<select id="teamSelect">
  <option value="">Select a team</option>
</select>

<div id="teamBox" class="team-box"></div>

<a href="index.html" class="home-link">Home</a>

<script>
  // Full roster data for all 20 teams
  const rosters = {
    "Dogs": ["@jaylon", "@orangewater5", "@sinatra", "Player4", "Player5"],
    "Vampires": ["Player6", "Player7", "Player8", "Player9", "Player10"],
    "Titans": ["Player11", "Player12", "Player13", "Player14", "Player15"],
    "Dubs": ["Player16", "Player17", "Player18", "Player19", "Player20"],
    "Bullets": ["Player21", "Player22", "Player23", "Player24", "Player25"],
    "Polar Bears": ["Player26", "Player27", "Player28", "Player29", "Player30"],
    "Bloodhawks": ["Player31", "Player32", "Player33", "Player34", "Player35"],
    "Karma Chefs": ["Player36", "Player37", "Player38", "Player39", "Player40"],
    "Acsended": ["Player41", "Player42", "Player43", "Player44", "Player45"],
    "Tourists": ["Player46", "Player47", "Player48", "Player49", "Player50"],
    "Falcons": ["Player51", "Player52", "Player53", "Player54", "Player55"],
    "Firebirds": ["Player56", "Player57", "Player58", "Player59", "Player60"],
    "Daggers": ["Player61", "Player62", "Player63", "Player64", "Player65"],
    "Stars": ["Player66", "Player67", "Player68", "Player69", "Player70"],
    "Lightning": ["Player71", "Player72", "Player73", "Player74", "Player75"],
    "Martians": ["Player76", "Player77", "Player78", "Player79", "Player80"],
    "Thunder": ["Player81", "Player82", "Player83", "Player84", "Player85"],
    "Methsters": ["Player86", "Player87", "Player88", "Player89", "Player90"],
    "Crusaders": ["Player91", "Player92", "Player93", "Player94", "Player95"],
    "Wolves": ["Player96", "Player97", "Player98", "Player99", "Player100"]
  };

  const select = document.getElementById("teamSelect");
  const box = document.getElementById("teamBox");

  // Populate dropdown
  for (let team in rosters) {
    const option = document.createElement("option");
    option.value = team;
    option.text = team;
    select.appendChild(option);
  }

  // Show roster when a team is selected
  select.addEventListener("change", () => {
    const team = select.value;
    if (!team) {
      box.style.display = "none";
      return;
    }

    let html = `<div class="team-name">${team}</div>`;
    rosters[team].forEach(player => {
      html += `<div class="player">${player}</div>`;
    });

    box.innerHTML = html;
    box.style.display = "block";
  });
</script>

</body>
</html>
