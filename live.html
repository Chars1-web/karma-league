<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--gold:#ffd54a;
--text:#f5f5f5;
--muted:#7f8598;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
font-family:'DM Sans',sans-serif;
background:radial-gradient(circle at top center, rgba(255,213,74,.06), transparent 30%),linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
}
header{
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
}
.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}
h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
}
h1 span{color:var(--accent);}
.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}
#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,213,74,.08);
border:1px solid rgba(255,213,74,.28);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--gold);
}
main{
max-width:760px;
margin:auto;
padding:28px 14px 80px;
}
.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{
flex:1;
padding:11px;
text-align:center;
font-size:12px;
font-weight:700;
letter-spacing:.07em;
text-transform:uppercase;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--muted);
cursor:pointer;
}
.tab.active{background:var(--accent);color:#000;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}
.live-list{display:flex;flex-direction:column;gap:16px;}
.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.02), rgba(255,255,255,.008));
border:1px solid var(--border);
border-radius:18px;
padding:20px;
cursor:pointer;
transition:.2s;
}
.live-row-item:hover{transform:translateY(-3px);border-color:rgba(255,213,74,.4);}
.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
text-align:center;
gap:8px;
}
.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
}
.team-score{
font-size:15px;
font-weight:800;
color:var(--accent);
}
.winner{
color:var(--gold);
text-shadow:0 0 8px rgba(255,213,74,.7),0 0 20px rgba(255,213,74,.5);
}
.trophy{margin-left:5px;}
.vs{
font-family:'Bebas Neue',sans-serif;
font-size:15px;
color:var(--muted);
}
.diff{
margin-top:5px;
font-size:11px;
font-weight:700;
color:var(--gold);
letter-spacing:.08em;
text-transform:uppercase;
}
.projection{margin-top:16px;}
.proj-label{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:6px;
}
.bar-wrap{
height:10px;
background:#1b1f2a;
border-radius:999px;
overflow:hidden;
}
.bar-fill{
height:100%;
background:linear-gradient(to right,var(--gold),#fff1a6);
}
.mvp{
margin-top:14px;
font-size:12px;
font-weight:700;
text-align:center;
color:var(--gold);
}
.schedule-group{margin-bottom:28px;}
.schedule-date{
font-family:'Bebas Neue',sans-serif;
font-size:20px;
color:var(--accent);
margin-bottom:10px;
border-bottom:1px solid var(--border);
padding-bottom:8px;
}
.schedule-row{
display:flex;
align-items:center;
gap:12px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px 16px;
margin-bottom:8px;
}
.sched-team{flex:1;font-family:'Bebas Neue',sans-serif;font-size:20px;}
.sched-team.right{text-align:right;}
.sched-vs{font-size:11px;color:var(--muted);}
#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}
#live-modal[hidden]{display:none;}
.modal-inner{width:100%;max-width:560px;}
.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}
.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
color:var(--gold);
}
.close-btn{
background:var(--card);
border:1px solid var(--border);
color:white;
padding:8px 15px;
border-radius:999px;
cursor:pointer;
}
.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}
.boxscore-team{
display:flex;
justify-content:space-between;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid var(--border);
}
.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}
.top-player{color:var(--gold);font-weight:800;}
.spinner{
display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
footer{text-align:center;padding-bottom:45px;}
footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:white;
font-size:12px;
}
</style>
</head>
<body>

<header>
<div class="header-top">Official KRL Live Scoring Site</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>
<div id="live-badge">● Live Games In Progress</div>
</header>

<main>
<div class="tabs">
<div class="tab active" data-tab="live">🔴 Live</div>
<div class="tab" data-tab="schedule">Schedule</div>
</div>

<div id="tab-live" class="tab-content active">
<div class="section-title">Today's Matchups</div>
<div id="live-scoring"><p><span class="spinner"></span> Loading...</p></div>
</div>

<div id="tab-schedule" class="tab-content">
<div class="section-title">Full Schedule</div>
<div id="schedule-content"><p><span class="spinner"></span> Loading...</p></div>
</div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer><a href="index.html">← Back to Home</a></footer>

<script src="app.js"></script>
</body>
</html>
