*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background grid ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  padding: 40px 24px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.header-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 8vw, 72px);
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--text);
}

h1 span {
  color: var(--accent);
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,60,110,0.12);
  border: 1px solid rgba(255,60,110,0.3);
  border-radius: 99px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-top: 14px;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* ── Main ── */
main {
  position: relative;
  z-index: 1;
  max-width: 600px;
  margin: 0 auto;
  padding: 32px 16px 80px;
}

/* ── Game cards ── */
.live-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.live-row-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.live-row-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
  transform: scaleY(0);
  transition: transform 0.2s;
}

.live-row-item:hover {
  border-color: rgba(232,255,60,0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.live-row-item:hover::before {
  transform: scaleY(1);
}

.live-matchup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  text-align: center;
}

.team-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.team-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.05em;
  line-height: 1.1;
  color: var(--text);
}

.team-score {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(232,255,60,0.08);
  border-radius: 6px;
  padding: 2px 8px;
  letter-spacing: 0.05em;
}

.vs-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--muted);
}

.game-number {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  font-weight: 500;
}

.tap-hint {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-top: 28px;
}

/* ── Modal ── */
#live-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  overflow-y: auto;
  z-index: 100;
  animation: fadeIn 0.2s ease;
}

#live-modal[hidden] { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-inner {
  width: 100%;
  max-width: 520px;
  padding-bottom: 40px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0 20px;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.1em;
  color: var(--accent);
}

.close-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  padding: 8px 18px;
  border-radius: 99px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.close-btn:hover {
  border-color: var(--accent2);
  background: rgba(255,60,110,0.1);
  color: var(--accent2);
}

/* ── Boxscore ── */
#live-details { width: 100%; }

.boxscore-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  animation: slideUp 0.25s ease both;
}

.boxscore-card:nth-child(2) { animation-delay: 0.06s; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.boxscore-team {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.boxscore-team-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.05em;
  color: var(--text);
}

.boxscore-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(232,255,60,0.08);
  border-radius: 6px;
  padding: 2px 10px;
}

.boxscore-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  padding: 8px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 14px;
  gap: 8px;
}

.boxscore-row:last-child { border-bottom: none; }

.header-row {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 6px;
}

.header-row span:not(:first-child) { text-align: center; }
.boxscore-row span:not(:first-child) { text-align: center; color: var(--muted); }
.boxscore-row span:first-child { font-weight: 500; }

.boxscore-empty {
  color: var(--muted);
  font-style: italic;
  font-size: 13px;
  padding: 8px 0;
}

/* ── Footer ── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 0 40px;
}

.home-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 10px 22px;
  border-radius: 10px;
  transition: border-color 0.2s, background 0.2s;
}

.home-link:hover {
  border-color: var(--accent);
  background: rgba(232,255,60,0.06);
  color: var(--accent);
}

/* ── Loading / Error ── */
#live-scoring p {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 60px 0;
  letter-spacing: 0.05em;
}


/* Tabs */
.tabs { display: flex; gap: 8px; margin-bottom: 24px; }
.tab { flex: 1; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; }

.completed-team { display: flex; flex-direction: column; align-items: center; gap: 3px; }

.completed-vs { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--muted); letter-spacing: 0.15em; }
.final-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: center; margin-top: 8px; }

.loading-spinner {

<body>

  <header>
    <div class="header-eyebrow">Fantasy Sports</div>
    <h1>Karma <span>Rank</span> League</h1>
    <div class="live-badge">
      <span class="live-dot"></span>
      Live Scores
    </div>
  </header>

  <main>
    <div class="tabs">
      <div class="tab active" data-tab="live">🔴 Live</div>
      <div class="tab" data-tab="final">Final</div>
    </div>
    <div id="tab-live" class="tab-content active">
      <div id="live-scoring"><p><span class="loading-spinner"></span> Loading scores…</p></div>
    </div>
    <div id="tab-final" class="tab-content">
      <div id="final-scoring"><p><span class="loading-spinner"></span> Loading…</p></div>
    </div>
  </main>

  <div id="live-modal" hidden>
    <div class="modal-inner">
      <div class="modal-header">
        <span class="modal-title">Box Score</span>
        <button class="close-btn" data-close="true">✕ Close</button>
      </div>
      <div id="live-details"></div>
    </div>
  </div>

  <footer>
    <a href="index.html" class="home-link">← Back to Home</a>
  </footer>

  <script>
    // ── Helpers ──────────────────────────────────────────────────────────────────
    function parseCSV(text) {
      const rows = [];
      let row = [], value = "", inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') { value += '"'; i++; }
          else inQuotes = !inQuotes;
          continue;
        }
        if (char === ',' && !inQuotes) { row.push(value.trim()); value = ""; continue; }
        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(value.trim());
          if (row.length > 1 || row[0] !== '') rows.push(row);
          row = []; value = "";
          continue;
        }
        value += char;
      }
      if (value.length || row.length) { row.push(value.trim()); rows.push(row); }
      return rows;
    }
    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function normalizeTeamName(name) {
      return String(name || '')
        .replace(/\([^)]*\)/g, '')
        .replace(/[:*]/g, '')
        .replace(/[^a-zA-Z0-9 ]/g, ' ').replace(/\s+/g, ' ')
        .trim().toLowerCase();
    }
    function colToIndex(letter) {
      return letter.toUpperCase().charCodeAt(0) - 65;
    }
    function sliceRange(rows, range) {
      const match = range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i);
      if (!match) return [];
      const startCol = colToIndex(match[1]), endCol = colToIndex(match[3]);
      const startRow = Number(match[2]) - 1, endRow = Number(match[4]) - 1;
      return rows.slice(startRow, endRow + 1).map(r => r.slice(startCol, endCol + 1));
    }
    function parseTeamHeader(raw) {
      const str = String(raw || '').trim();
      const match = str.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
      if (match) return { name: match[1].trim(), score: match[2].trim() };
      return { name: str, score: null };
    }

    function isCaptain(name) {
      const s = String(name || '').trim();
      return /\(C\)/i.test(s) || /^C\s+/.test(s) || /\s+C$/.test(s);
    }
    function cleanName(name) {
      return String(name || '').replace(/\(C\)/gi, '').replace(/^C\s+/, '').replace(/\s+C$/, '').trim();
    }

    // ── Config ───────────────────────────────────────────────────────────────────
    const LIVE_SCORING_URL = "/api/sheet?name=live-scoring";
    const SCHEDULE_URL = "/api/sheet?name=schedule";
    const els = {
      liveRow:     document.getElementById("live-scoring"),
      liveModal:   document.getElementById("live-modal"),
      liveDetails: document.getElementById("live-details"),
    };

    // ── Logic ────────────────────────────────────────────────────────────────────
    function extractLeagueDay(rows) {
      const row = rows.find(r =>
        String(r[0] || '').includes('League Day') ||
        String(r[1] || '').includes('League Day')
      );
      if (!row) return '';
      const cell = String(row[0] || row[1] || '');
      const parts = cell.split(':');
      return parts.length > 1 ? parts[1].trim() : cell.trim();
    }
    function parseLiveGames(rows) {
      const RANGES = [
        "A5:G11","A13:G19","A21:G27","A29:G35","A37:G43",
        "A45:G51","A53:G59","A61:G67","A69:G75","A77:G83",
        "A85:G91","A93:G99","A101:G107","A109:G115","A117:G122",
      ];
      const games = [];
      RANGES.forEach(range => {
        const block = sliceRange(rows, range);
        if (!block.length) return;
        let team1Raw = '', team2Raw = '', headerIndex = 0;
        for (let i = 0; i < block.length; i++) {
          const c = block[i] || [];
          const left  = String(c[0] || '').trim();
          const right = String(c[4] || '').trim();
          if (left && right && !left.startsWith('@') && !right.startsWith('@') &&
              !left.includes('League Day') && !right.includes('League Day')) {
            team1Raw = left; team2Raw = right; headerIndex = i; break;
          }
        }
        if (!team1Raw || !team2Raw) return;
        const t1 = parseTeamHeader(team1Raw);
        const t2 = parseTeamHeader(team2Raw);
        const players = block.slice(headerIndex + 1)
          .filter(row => String(row[0] || row[4] || '').trim() !== '');
        games.push({
          team1: t1.name, team2: t2.name,
          team1Score: t1.score, team2Score: t2.score,
          key: `${normalizeTeamName(t1.name)}|${normalizeTeamName(t2.name)}`,
          team1Players: players.map(r => ({ player: r[0]||'', points: r[1]||'', rank: r[2]||'' })),
          team2Players: players.map(r => ({ player: r[4]||'', points: r[5]||'', rank: r[6]||'' })),
        });
      });
      return games;
    }
    function getLiveScheduleIndexes(scheduleRows) {
      const headers = (scheduleRows[0] || []).map(h => String(h || '').trim().toLowerCase());
      const findIdx = checks => headers.findIndex(h => checks.some(c => h.includes(c)));
      let date  = findIdx(['date']);
      let team1 = findIdx(['team 1','team1','away']);
      let team2 = findIdx(['team 2','team2','home']);
      if (team1 === -1 || team2 === -1) {
        if ((scheduleRows[0] || []).length >= 4) {
          if (date  === -1) date  = 1;
          if (team1 === -1) team1 = 2;
          if (team2 === -1) team2 = 3;
        } else {
          if (date  === -1) date  = 0;
          if (team1 === -1) team1 = 1;
          if (team2 === -1) team2 = 2;
        }
      }
      return { date, team1, team2 };
    }
    function renderLiveScoring(liveRows, scheduleRows) {
      if (!liveRows.length) { els.liveRow.innerHTML = '<p>No live scoring available.</p>'; return; }
      const leagueDay = extractLeagueDay(liveRows);
      const liveGames = parseLiveGames(liveRows);
      const liveMap = new Map(liveGames.map(g => [g.key, g]));
      const idx = getLiveScheduleIndexes(scheduleRows);
      let games = scheduleRows.slice(1)
        .filter(row => String(row[idx.date] || '').trim() === leagueDay)
        .map(row => {
          const team1 = String(row[idx.team1] || '').trim();
          const team2 = String(row[idx.team2] || '').trim();
          const key = `${normalizeTeamName(team1)}|${normalizeTeamName(team2)}`;
          const live = liveMap.get(key) || null;
          return {
            team1, team2,
            team1Score: live ? live.team1Score : null,
            team2Score: live ? live.team2Score : null,
            team1Players: live ? live.team1Players : [],
            team2Players: live ? live.team2Players : [],
          };
        });
      if (!games.length) games = liveGames;
      if (!games.length) { els.liveRow.innerHTML = '<p>No live games found.</p>'; return; }

      const scoreBadge = (score) => score !== null
        ? `<span class="team-score">${escapeHtml(score)}</span>` : '';

      els.liveRow.innerHTML = `
        <div class="live-list">
          ${games.map((g, i) => `
            <div class="live-row-item" data-index="${i}">
              <div class="live-matchup">
                <div class="team-block">
                  <span class="team-name">${escapeHtml(g.team1)}</span>
                  ${scoreBadge(g.team1Score)}
                </div>
                <div class="vs-block">
                  <span class="vs">VS</span>
                  <span class="game-number">GAME ${i + 1}</span>
                </div>
                <div class="team-block">
                  <span class="team-name">${escapeHtml(g.team2)}</span>
                  ${scoreBadge(g.team2Score)}
                </div>
              </div>
            </div>`).join('')}
        </div>
        <p class="tap-hint">TAP A GAME FOR BOX SCORE</p>`;

      els.liveRow.onclick = event => {
        const rowEl = event.target.closest('.live-row-item');
        if (!rowEl) return;
        const game = games[Number(rowEl.dataset.index)];
        if (!game) return;
        const tbl = (players, name, score) => `
          <div class="boxscore-card">
            <div class="boxscore-team">
              <span class="boxscore-team-name">${escapeHtml(name)}</span>
              ${score !== null ? `<span class="boxscore-score">${escapeHtml(score)}</span>` : ''}
            </div>
            <div class="boxscore-row header-row">
              <span>Player</span><span>Rank</span>
            </div>
            ${players.filter(p => String(p.player || '').trim()).map(p => {
              const isCpt = p.captain;
              const rawRank = parseFloat(p.rank);
              const boosted = isCpt && !isNaN(rawRank) ? Math.round(rawRank / 1.5) : null;
              const rankDisplay = isCpt
                ? (boosted !== null ? escapeHtml(p.rank) + ' → ' + boosted : '—')
                : (escapeHtml(p.rank) || '—');
              return `
              <div class="boxscore-row">
                <span>${escapeHtml(p.player)}${isCpt ? ' <span style="color:#ff9f1c;font-size:10px;font-weight:700;background:rgba(255,159,28,0.15);border-radius:4px;padding:1px 5px;">CPT</span>' : ''}</span>
                <span>${rankDisplay}</span>
              </div>`;
            }).join('') || '<div class="boxscore-empty">No stats yet.</div>'}
          </div>`;
        els.liveDetails.innerHTML =
          tbl(game.team1Players, game.team1, game.team1Score) +
          tbl(game.team2Players, game.team2, game.team2Score);
        els.liveModal.hidden = false;
      };
    }

    // ── Fetch & Boot ─────────────────────────────────────────────────────────────
    async function fetchSheet(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
      const rows = parseCSV(await res.text());
      if (!rows.length) throw new Error('No data found.');
      return rows;
    }
    async function loadData() {
      try {
        const [liveData, scheduleData] = await Promise.all([
          fetchSheet(LIVE_SCORING_URL),
          fetchSheet(SCHEDULE_URL),
        ]);
        renderLiveScoring(liveData, scheduleData);
      // Pass same games to completed tab — pulled from app.js globals
      setTimeout(() => {
        const gameEls = document.querySelectorAll('.live-row-item');
        if (gameEls.length) {
          // games are rendered, trigger completed view with same data
          renderCompletedGames(window._liveGames || []);
        }
      }, 500);
      } catch (err) {
        els.liveRow.innerHTML = `<p>Failed to load: ${escapeHtml(err.message)}</p>`;
      }
    }
    document.addEventListener('click', e => {
      if (e.target.matches("[data-close='true']")) els.liveModal.hidden = true;
    });

    // ── Tabs ──────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('tab-' + t.dataset.tab).classList.add('active');
      });
    });

    // ── Is game complete? ─────────────────────────────────────────────────────
    // Games complete at 6:00 AM EST = 11:00 AM UTC
    function isGameComplete() {
      const now = new Date();
      // Convert to EST (UTC-5 or UTC-4 for EDT)
      const estOffset = -5 * 60; // minutes, approximate (no DST handling)
      const estNow = new Date(now.getTime() + (now.getTimezoneOffset() + estOffset) * 60000);
      return estNow.getHours() >= 6;
    }

    // renderCompletedGames uses same game data but shows as final
    function renderCompletedGames(games) {
      const el = document.getElementById('final-scoring');
      const complete = isGameComplete();

      if (!complete) {
        el.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:48px 0;">Games complete at 6:00 AM EST.</p>';
        return;
      }

      if (!games || !games.length) {
        el.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:48px 0;">No completed games.</p>';
        return;
      }

      el.innerHTML = games.map((g, i) => {
        const s1 = parseFloat(g.team1Score);
        const s2 = parseFloat(g.team2Score);
        const hasScores = !isNaN(s1) && !isNaN(s2);
        const t1win = hasScores && s1 < s2;
        const t2win = hasScores && s2 < s1;
        return `<div class="completed-item" data-index="${i}">
          <div class="completed-matchup">
            <div class="completed-team" style="text-align:center;">
              <div class="completed-name">${escapeHtml(g.team1)}</div>
              <div class="completed-score ${t1win ? 'winner' : 'loser'}">${hasScores ? s1 : '—'}</div>
            </div>
            <div class="completed-vs">FINAL</div>
            <div class="completed-team" style="text-align:center;">
              <div class="completed-name">${escapeHtml(g.team2)}</div>
              <div class="completed-score ${t2win ? 'winner' : 'loser'}">${hasScores ? s2 : '—'}</div>
            </div>
          </div>
        </div>`;
      }).join('');

      // Click to open same boxscore modal
      el.onclick = event => {
        const item = event.target.closest('.completed-item');
        if (!item) return;
        const game = games[Number(item.dataset.index)];
        if (!game) return;
        // Reuse existing modal logic
        document.getElementById('live-scoring').dispatchEvent(
          Object.assign(new MouseEvent('click', { bubbles: true }),
            { _forceGame: game })
        );
      };
    }

    loadData();
  </script>

</body>
</html>
