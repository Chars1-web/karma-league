<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League – Live Scores</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial,sans-serif; text-align:center; padding:20px; }
    h1 { font-size:48px; margin-bottom:30px; }
    .matchup-box { background:white; color:black; border-radius:15px; padding:20px; margin:15px auto; width:90%; max-width:380px; font-size:24px; cursor:pointer; transition:0.2s; }
    .matchup-box:hover { transform:scale(1.05); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; flex-direction:column; padding:20px; }
    .modal-content { background:white; color:black; border-radius:15px; padding:20px; width:90%; max-width:500px; font-size:20px; margin-bottom:20px; text-align:left; overflow-y:auto; max-height:90%; }
    .close-btn { font-size:28px; border:none; background:red; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Ascended Karma League – Live Scores</h1>

<div id="matchups">
  <!-- Manual matchup boxes for today -->
  <div class="matchup-box" onclick="showMatchup('Dogs', 'Vampires')">Dogs vs Vampires</div>
  <div class="matchup-box" onclick="showMatchup('Titans', 'Dubs')">Titans vs Dubs</div>
  <div class="matchup-box" onclick="showMatchup('Bullets', 'Polar Bears')">Bullets vs Polar Bears</div>
  <div class="matchup-box" onclick="showMatchup('Bloodhawks', 'Karma Chefs')">Bloodhawks vs Karma Chefs</div>
  <div class="matchup-box" onclick="showMatchup('Ascended', 'Tourists')">Ascended vs Tourists</div>
</div>

<div id="modal" class="modal">
  <div id="modalContent" class="modal-content"></div>
  <button class="close-btn" onclick="closeModal()">❌ Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_YL3WsvgFtH1JhXgQN2ft-ASzR570T2W_J8jFOhaCqeKzO-CpqjAXkekS4Cm6cQ/pub?output=csv"; // your In Progress CSV

let sheetData = [];

// Load CSV sheet
Papa.parse(sheetURL, {
  download: true,
  header: false,
  skipEmptyLines: true,
  complete: function(results) {
    sheetData = results.data;
    console.log("Sheet loaded:", sheetData);
  }
});

// Show matchup modal
function showMatchup(teamA, teamB) {
  function getLineup(team) {
    const row = sheetData.find(r => r[0] && r[0].trim().toLowerCase() === team.trim().toLowerCase());
    if(!row) return null;

    const players = row.slice(1,6)
      .filter(c => c && c.trim() !== "")
      .map(p => {
        let [name, karma] = p.split("=");
        karma = karma ? parseFloat(karma.trim()) : 0;
        if(name.toLowerCase().includes("(c)")) karma *= 1.2;
        return {name: name.trim(), karma};
      });

    return players.length ? players : null;
  }

  const playersA = getLineup(teamA);
  const playersB = getLineup(teamB);

  let html = "";

  if(playersA){
    let totalA=0;
    html += `<strong>${teamA}</strong><br>`;
    playersA.forEach(p=>{
      html += `${p.name} — ${p.karma.toFixed(1)}<br>`;
      totalA += p.karma;
    });
    html += `<br><strong>Total: ${totalA.toFixed(1)}</strong><br><br>`;
  } else {
    html += `<strong>${teamA}</strong><br>Lineup Pending<br><br>`;
  }

  if(playersB){
    let totalB=0;
    html += `<strong>${teamB}</strong><br>`;
    playersB.forEach(p=>{
      html += `${p.name} — ${p.karma.toFixed(1)}<br>`;
      totalB += p.karma;
    });
    html += `<br><strong>Total: ${totalB.toFixed(1)}</strong>`;
  } else {
    html += `<strong>${teamB}</strong><br>Lineup Pending`;
  }

  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){ document.getElementById("modal").style.display="none"; }
</script>

</body>
</html>
