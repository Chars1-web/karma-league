<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League – Live Scores</title>
  <style>
    body {
      background:#0a0a0a;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:20px;
    }
    h1 { font-size:48px; margin-bottom:30px; }
    .matchup-box {
      background:white;
      color:black;
      border-radius:15px;
      padding:20px;
      margin:15px auto;
      width:90%;
      max-width:380px;
      font-size:24px;
      cursor:pointer;
      transition:0.2s;
    }
    .matchup-box:hover { transform:scale(1.05); }
    .modal {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:20px;
    }
    .modal-content {
      background:white;
      color:black;
      border-radius:15px;
      padding:20px;
      width:90%;
      max-width:500px;
      font-size:20px;
      margin-bottom:20px;
      text-align:left;
    }
    .close-btn {
      font-size:28px;
      border:none;
      background:red;
      color:white;
      padding:10px 20px;
      border-radius:10px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>Ascended Karma League – Live Scores</h1>
<div id="matchups"></div>

<div id="modal" class="modal">
  <div id="modalContent" class="modal-content"></div>
  <button class="close-btn" onclick="closeModal()">❌ Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?output=csv";

const matchupsDiv = document.getElementById("matchups");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

Papa.parse(sheetURL, {
  download: true,
  complete: function(results) {
    // Flatten all columns in each row, skip empty cells, skip first 3 rows
    const rows = results.data.slice(3)
      .map(r => Object.values(r).filter(cell => cell && cell.toString().trim() !== ""))
      .flat();

    let currentTeam = null;
    let currentPlayers = [];
    let matchupPairs = [];

    rows.forEach(line => {
      line = line.trim();
      if(line.toLowerCase() === "vs") {
        if(currentTeam) {
          matchupPairs.push({team: currentTeam, players: currentPlayers});
          currentTeam = null;
          currentPlayers = [];
        }
      } else if(!currentTeam) {
        currentTeam = line; // team name
      } else {
        let [playerName, karma] = line.split("=");
        if(karma !== undefined) karma = parseFloat(karma.trim());
        else karma = 0;
        currentPlayers.push({name: playerName.trim(), karma: karma});
      }
    });

    if(currentTeam) matchupPairs.push({team: currentTeam, players: currentPlayers});

    // Create matchup boxes
    for(let i=0; i<matchupPairs.length; i+=2){
      const teamA = matchupPairs[i];
      const teamB = matchupPairs[i+1];
      if(!teamB) continue;

      const box = document.createElement("div");
      box.className = "matchup-box";
      box.textContent = `${teamA.team} vs ${teamB.team}`;

      box.onclick = () => {
        let html = `<strong>${teamA.team}</strong><br>`;
        let totalA = 0;
        teamA.players.slice(0,5).forEach(p => {
          let playerKarma = p.karma;
          if(p.name.toLowerCase().includes("(c)")) playerKarma *= 1.2;
          html += `${p.name} — ${playerKarma.toFixed(1)}<br>`;
          totalA += playerKarma;
        });
        html += `<br><strong>Total: ${totalA.toFixed(1)}</strong><br><br>`;

        html += `<strong>${teamB.team}</strong><br>`;
        let totalB = 0;
        teamB.players.slice(0,5).forEach(p => {
          let playerKarma = p.karma;
          if(p.name.toLowerCase().includes("(c)")) playerKarma *= 1.2;
          html += `${p.name} — ${playerKarma.toFixed(1)}<br>`;
          totalB += playerKarma;
        });
        html += `<br><strong>Total: ${totalB.toFixed(1)}</strong>`;

        modalContent.innerHTML = html;
        modal.style.display = "flex";
      };

      matchupsDiv.appendChild(box);
    }
  }
});

function closeModal(){ modal.style.display = "none"; }
</script>

</body>
</html>
