<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League - Live Scores</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 10px;
    }
    h1 { 
      font-size: 48px; 
      margin-bottom: 50px; 
    }
    .match {
      background: #111;
      border: 3px solid white;
      border-radius: 20px;
      padding: 50px 30px;
      margin: 25px auto;
      width: 320px;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .match:hover { background: #222; }
    .lineup {
      display: none;
      background: #222;
      border: 2px solid white;
      border-radius: 15px;
      padding: 25px;
      margin: 15px auto 35px auto;
      width: 300px;
      font-size: 24px;
      line-height: 1.5;
    }
    .home-link {
      display: block;
      margin-top: 60px;
      font-size: 32px; /* bigger link */
      color: white;
      text-decoration: none;
      border: 3px solid white;
      border-radius: 15px;
      padding: 20px 0;
      width: 220px;
      margin-left: auto;
      margin-right: auto;
      transition: all 0.2s;
    }
    .home-link:hover {
      background: white;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Live Scores</h1>

<div class="match" onclick="toggleLineup('match1')">Shockers vs Raptors</div>
<div class="lineup" id="match1">
  Delta — 12.9K Karma<br>
  Player5 — 9.3K Karma<br>
  Player6 — 8.7K Karma
</div>

<div class="match" onclick="toggleLineup('match2')">Lions vs Tacos</div>
<div class="lineup" id="match2">
  Player3 — 10.1K Karma<br>
  Player4 — 8.9K Karma<br>
  Player7 — 7.5K Karma
</div>

<div class="match" onclick="toggleLineup('match3')">Raptors vs Knights</div>
<div class="lineup" id="match3">
  Player2 — 11.5K Karma<br>
  Player8 — 9.7K Karma<br>
  Player9 — 8.2K Karma
</div>

<a href="index.html" class="home-link">Home</a>

<script>
  function toggleLineup(id) {
    const element = document.getElementById(id);
    element.style.display = (element.style.display === "block") ? "none" : "block";
  }
</script>

</body>
</html>
