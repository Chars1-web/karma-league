<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League - Live Scores</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabletop.js/1.6.0/tabletop.min.js"></script>

  <style>
    body {
      background:#0a0a0a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    h1 {
      font-size:48px;
      margin-bottom:30px;
    }

    /* Match boxes */
    .match {
      background:white;
      color:black;
      border-radius:15px;
      padding:30px;
      margin:15px auto;
      width:320px;
      font-size:28px;
      font-weight:bold;
      cursor:pointer;
    }

    /* Full screen popup */
    .modal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#0a0a0a;
      z-index:1000;
      padding:30px;
      overflow:auto;
    }

    .close {
      position:absolute;
      top:20px;
      right:20px;
      font-size:40px;
      cursor:pointer;
    }

    .player {
      font-size:28px;
      margin:10px 0;
    }

    .total {
      margin-top:30px;
      font-size:36px;
      font-weight:bold;
    }

    .home-link {
      display:block;
      margin-top:40px;
      font-size:28px;
      border:2px solid white;
      padding:15px;
      width:200px;
      margin-left:auto;
      margin-right:auto;
      text-decoration:none;
      color:white;
    }
  </style>
</head>

<body>

<h1>Live Scores</h1>

<div id="matches"></div>

<a href="index.html" class="home-link">Home</a>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="close" onclick="closeModal()">✖</div>
  <div id="modal-content"></div>
</div>

<script>
const sheetID = "1BPfds7P3yNy_W3iQEufFzb4AzH56Z1kA";

function init() {
  Tabletop.init({
    key: sheetID,
    callback: showData,
    simpleSheet: true
  });
}

function showData(data) {
  const container = document.getElementById("matches");

  const matches = {};

  data.forEach(row => {
    if (!matches[row.Match]) {
      matches[row.Match] = [];
    }
    matches[row.Match].push(row);
  });

  Object.keys(matches).forEach(matchName => {

    const matchDiv = document.createElement("div");
    matchDiv.className = "match";
    matchDiv.innerText = matchName;

    matchDiv.onclick = () => openModal(matchName, matches[matchName]);

    container.appendChild(matchDiv);
  });
}

function openModal(matchName, players) {
  const modal = document.getElementById("modal");
  const content = document.getElementById("modal-content");

  let html = `<h1>${matchName}</h1>`;

  let total = 0;

  players.forEach(p => {
    let num = parseFloat(p.Karma);
    if (!isNaN(num)) total += num;

    html += `<div class="player">${p.Player} — ${p.Karma}</div>`;
  });

  html += `<div class="total">Total: ${total.toFixed(1)}K</div>`;

  content.innerHTML = html;
  modal.style.display = "block";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
