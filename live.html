<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:DM Sans,sans-serif;
background:#0b0d14;
color:white;
}

header{
text-align:center;
padding:30px;
border-bottom:1px solid #222;
}

h1{
font-family:Bebas Neue;
font-size:60px;
margin:0;
}

h1 span{color:#e8ff3c;}

.tabs{
display:flex;
gap:10px;
padding:20px;
}

.tab{
flex:1;
padding:10px;
text-align:center;
background:#11141d;
border:1px solid #222;
cursor:pointer;
color:#888;
font-weight:700;
}

.tab.active{
background:#e8ff3c;
color:black;
}

.tab-content{display:none;padding:20px;}
.tab-content.active{display:block;}

.card{
background:#11141d;
border:1px solid #222;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.team{
display:flex;
justify-content:space-between;
font-family:Bebas Neue;
font-size:28px;
}

.score{
color:#e8ff3c;
}

.odds{
font-size:12px;
margin-top:5px;
color:#aaa;
}

.win{color:#4dff9d;}
.lose{color:#ff4a72;}

footer{
text-align:center;
padding:30px;
}

a{
color:white;
text-decoration:none;
background:#11141d;
padding:10px 20px;
border-radius:10px;
display:inline-block;
border:1px solid #222;
}
</style>
</head>

<body>

<header>
<h1>Karma <span>Rank</span> League</h1>
</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('live')">Live</div>
<div class="tab" onclick="switchTab('schedule')">Schedule</div>
</div>

<div id="live" class="tab-content active"></div>
<div id="schedule" class="tab-content"></div>

<footer>
<a href="index.html">← Back Home</a>
</footer>

<script>
// ───────── DEMO DATA (so nothing ever breaks) ─────────
const liveGames = [
{team1:"Artemis",team2:"Wolves",score1:48,score2:52},
{team1:"Beasts",team2:"Falcons",score1:30,score2:22},
{team1:"Patriots",team2:"Reapers",score1:61,score2:59}
];

const scheduleGames = [
{team1:"Artemis",team2:"Wolves"},
{team1:"Beasts",team2:"Falcons"},
{team1:"Patriots",team2:"Reapers"},
{team1:"Judy Hopps FC",team2:"Predators"}
];

// ───────── ODDS ENGINE ─────────
function odds(a,b){
if(a==null||b==null) return {a:50,b:50};
let diff=a-b;
let base=50+diff*2;
base=Math.max(5,Math.min(95,base));
return {a:Math.round(base),b:100-Math.round(base)};
}

// ───────── LIVE RENDER ─────────
function renderLive(){
let html="";

liveGames.forEach(g=>{
let o=odds(g.score1,g.score2);

html+=`
<div class="card">
<div class="team">
<div>${g.team1}</div>
<div class="score">${g.score1}</div>
</div>

<div class="team">
<div>${g.team2}</div>
<div class="score">${g.score2}</div>
</div>

<div class="odds">
${g.team1} ${o.a}% - ${g.team2} ${o.b}%
</div>
</div>
`;
});

document.getElementById("live").innerHTML=html;
}

// ───────── SCHEDULE RENDER ─────────
function renderSchedule(){
let html="";

scheduleGames.forEach(g=>{
html+=`
<div class="card">
<div class="team">
<div>${g.team1}</div>
<div style="color:#888;font-size:14px;">VS</div>
<div>${g.team2}</div>
</div>
</div>
`;
});

document.getElementById("schedule").innerHTML=html;
}

// ───────── TAB SWITCH ─────────
function switchTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

if(tab==="live") document.querySelectorAll(".tab")[0].classList.add("active");
if(tab==="schedule") document.querySelectorAll(".tab")[1].classList.add("active");

document.getElementById(tab).classList.add("active");
}

// ───────── INIT ─────────
renderLive();
renderSchedule();
</script>

</body>
</html>
