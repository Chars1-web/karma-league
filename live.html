<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--red:#ff5f7d;
--green:#47ff98;
--text:#f5f5f5;
--muted:#7f8598;
--gold:#ffd54a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top center, rgba(255,213,74,.06), transparent 30%),
linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
background-size:32px 32px;
pointer-events:none;
}

header{
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
}

.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
letter-spacing:.04em;
line-height:1;
}

h1 span{color:var(--accent);}

.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,95,125,.08);
border:1px solid rgba(255,95,125,.28);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--red);
}

main{
max-width:760px;
margin:auto;
padding:28px 14px 80px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:24px;
}
.tab{
flex:1;
padding:11px 6px;
text-align:center;
font-size:12px;
font-weight:700;
letter-spacing:.07em;
text-transform:uppercase;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--muted);
cursor:pointer;
}
.tab.active{
background:var(--accent);
color:#050508;
border-color:var(--accent);
}
.tab-content{display:none;}
.tab-content.active{display:block;}

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}

#live-scoring p,#schedule-content p{
text-align:center;
padding:60px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:15px;
}

.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.02), rgba(255,255,255,.008));
border:1px solid var(--border);
border-radius:18px;
padding:22px 18px;
cursor:pointer;
transition:.22s;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.live-row-item:hover{
transform:translateY(-4px);
border-color:rgba(255,213,74,.4);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
text-align:center;
gap:8px;
}

.team-side{
display:flex;
flex-direction:column;
gap:5px;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:29px;
letter-spacing:.04em;
line-height:1;
}

.team-score{
font-size:15px;
font-weight:800;
color:var(--accent);
}

.winner{
color:var(--gold);
text-shadow:0 0 8px rgba(255,213,74,.7),0 0 18px rgba(255,213,74,.5);
animation:goldPulse 1.6s infinite alternate;
}

@keyframes goldPulse{
from{ text-shadow:0 0 6px rgba(255,213,74,.55),0 0 12px rgba(255,213,74,.35);}
to{ text-shadow:0 0 12px rgba(255,213,74,.95),0 0 26px rgba(255,213,74,.65);}
}

.trophy{
margin-left:5px;
font-size:18px;
filter:drop-shadow(0 0 8px rgba(255,213,74,.8));
animation:trophyGlow 1.5s infinite alternate;
}

@keyframes trophyGlow{
from{transform:scale(1);}
to{transform:scale(1.12);}
}

.center-info{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.vs{
font-family:'Bebas Neue',sans-serif;
font-size:16px;
letter-spacing:.18em;
color:var(--muted);
}

.tap{
font-size:9px;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}

.schedule-group{margin-bottom:28px;}
.schedule-date{
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:.06em;
color:var(--accent);
margin-bottom:10px;
padding-bottom:8px;
border-bottom:1px solid var(--border);
}
.schedule-row{
display:flex;
align-items:center;
gap:12px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px 16px;
margin-bottom:8px;
}
.sched-team{
flex:1;
font-family:'Bebas Neue',sans-serif;
font-size:20px;
}
.sched-team.right{text-align:right;}
.sched-vs{
font-size:11px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}
#live-modal[hidden]{display:none;}

.modal-inner{width:100%;max-width:560px;}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
letter-spacing:.08em;
color:var(--gold);
}

.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 15px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
display:flex;
justify-content:space-between;
align-items:center;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
padding-bottom:12px;
margin-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-score{
font-size:16px;
color:var(--accent);
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}

.header-row{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
}

.spinner{
display:inline-block;
width:15px;
height:15px;
border:2px solid var(--border);
border-top-color:var(--accent);
border-radius:50%;
animation:spin .7s linear infinite;
vertical-align:middle;
margin-right:5px;
}
@keyframes spin{to{transform:rotate(360deg);}}

footer{
text-align:center;
padding-bottom:45px;
}
footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="header-top">Official KRL Live Scoring Site</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>
<div id="live-badge">● Live Games In Progress</div>
</header>

<main>
<div class="tabs">
<div class="tab active" data-tab="live">🔴 Live</div>
<div class="tab" data-tab="schedule">Schedule</div>
</div>

<div id="tab-live" class="tab-content active">
<div class="section-title">Today's Matchups</div>
<div id="live-scoring"><p><span class="spinner"></span> Loading live scores...</p></div>
</div>

<div id="tab-schedule" class="tab-content">
<div class="section-title">Full Schedule</div>
<div id="schedule-content"><p><span class="spinner"></span> Loading schedule...</p></div>
</div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script>
function parseCSV(text){
const rows=[];let row=[],value="",inQuotes=false;
for(let i=0;i<text.length;i++){
const char=text[i],next=text[i+1];
if(char=='"'){if(inQuotes&&next=='"'){value+='"';i++;}else inQuotes=!inQuotes;continue;}
if(char==','&&!inQuotes){row.push(value.trim());value="";continue;}
if((char=='\n'||char=='\r')&&!inQuotes){
if(char=='\r'&&next=='\n')i++;
row.push(value.trim());
if(row.length>1||row[0]!=='')rows.push(row);
row=[];value="";continue;
}
value+=char;
}
if(value.length||row.length){row.push(value.trim());rows.push(row);}
return rows;
}

function formatNumber(num){
if(num===null||num===undefined||num==='') return '';
const n=Number(num);
if(isNaN(n)) return num;
return n.toLocaleString();
}

function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isCaptain(name){const s=String(name||'').trim();return /\(C\)/i.test(s)||/^C\s+/.test(s)||/\s+C$/.test(s);}
function cleanName(name){return String(name||'').replace(/\(C\)/gi,'').replace(/^C\s+/,'').replace(/\s+C$/,'').trim();}
function normalizeTeamName(name){return String(name||'').replace(/\([^)]*\)/g,'').replace(/[:*]/g,'').replace(/[^a-zA-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim().toLowerCase();}
function colToIndex(letter){return letter.toUpperCase().charCodeAt(0)-65;}
function sliceRange(rows,range){
const m=range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i); if(!m)return[];
const sc=colToIndex(m[1]),ec=colToIndex(m[3]),sr=+m[2]-1,er=+m[4]-1;
return rows.slice(sr,er+1).map(r=>r.slice(sc,ec+1));
}
function parseTeamHeader(raw){
const str=String(raw||'').trim();
const match=str.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
if(match) return {name:match[1].trim(),score:match[2].trim()};
return {name:str,score:null};
}

const LIVE_SCORING_URL="/api/sheet?name=live-scoring";
const SCHEDULE_URL="/api/sheet?name=schedule";

const els={
liveRow:document.getElementById("live-scoring"),
liveModal:document.getElementById("live-modal"),
liveDetails:document.getElementById("live-details")
};

document.querySelectorAll('.tab').forEach(t=>{
t.onclick=()=>{
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
t.classList.add('active');
document.getElementById('tab-'+t.dataset.tab).classList.add('active');
};
});

function renderSchedule(rows){
const c=document.getElementById("schedule-content");
const matchups=rows.slice(1).map(r=>({date:(r[0]||'').trim(),team1:(r[1]||'').trim(),team2:(r[2]||'').trim()})).filter(m=>m.team1&&m.team2);
const grouped={};
matchups.forEach(m=>{if(!grouped[m.date])grouped[m.date]=[];grouped[m.date].push(m);});
c.innerHTML=Object.keys(grouped).map(date=>`
<div class="schedule-group">
<div class="schedule-date">${escapeHtml(date)}</div>
${grouped[date].map(m=>`
<div class="schedule-row">
<span class="sched-team">${escapeHtml(m.team1)}</span>
<span class="sched-vs">vs</span>
<span class="sched-team right">${escapeHtml(m.team2)}</span>
</div>`).join('')}
</div>`).join('');
}

function extractLeagueDay(rows){
const row=rows.find(r=>String(r[0]||'').includes('League Day')||String(r[1]||'').includes('League Day'));
if(!row) return '';
const cell=String(row[0]||row[1]||'');
const parts=cell.split(':');
return parts.length>1?parts[1].trim():cell.trim();
}

function parseLiveGames(rows){
const RANGES=["A5:G11","A13:G19","A21:G27","A29:G35","A37:G43","A45:G51","A53:G59","A61:G67","A69:G75","A77:G83","A85:G91","A93:G99","A101:G107","A109:G115","A117:G122"];
const games=[];
RANGES.forEach(range=>{
const block=sliceRange(rows,range); if(!block.length)return;
let team1Raw='',team2Raw='',headerIndex=0;
for(let i=0;i<block.length;i++){
const c=block[i]||[];
const left=String(c[0]||'').trim();
const right=String(c[4]||'').trim();
if(left&&right&&!left.startsWith('@')&&!right.startsWith('@')){team1Raw=left;team2Raw=right;headerIndex=i;break;}
}
if(!team1Raw||!team2Raw)return;
const t1=parseTeamHeader(team1Raw),t2=parseTeamHeader(team2Raw);
const playerRows=block.slice(headerIndex+1).filter(r=>String(r[0]||r[4]||'').trim()!=='');

const buildPlayers=(pRows,nameCol,rankCol)=>pRows.map(r=>{
const rawName=String(r[nameCol]||'').trim();
if(!rawName)return null;
const captain=isCaptain(rawName);
const name=cleanName(rawName);
const rawRank=parseFloat(String(r[rankCol]||'').trim());
const score=isNaN(rawRank)?null:(captain?rawRank/1.5:rawRank);
return {player:name,rank:rawRank,score,captain};
}).filter(Boolean);

const team1Players=buildPlayers(playerRows,0,2);
const team2Players=buildPlayers(playerRows,4,6);

const sumScore=players=>{
const valid=players.filter(p=>p.score!==null);
if(!valid.length)return null;
return Math.round(valid.reduce((s,p)=>s+p.score,0));
};

games.push({
team1:t1.name,team2:t2.name,
team1Score:sumScore(team1Players),
team2Score:sumScore(team2Players),
key:`${normalizeTeamName(t1.name)}|${normalizeTeamName(t2.name)}`,
team1Players,team2Players
});
});
return games;
}

function renderLiveScoring(liveRows,scheduleRows){
const games=parseLiveGames(liveRows);
document.getElementById("live-badge").style.display='inline-block';

window._liveGames=games;

els.liveRow.innerHTML=`<div class="live-list">${games.map((g,i)=>{
const s1=Number(g.team1Score),s2=Number(g.team2Score);
const t1Win=!isNaN(s1)&&!isNaN(s2)&&s1<s2;
const t2Win=!isNaN(s1)&&!isNaN(s2)&&s2<s1;

return `
<div class="live-row-item" data-index="${i}">
<div class="live-matchup">
<div class="team-side">
<span class="team-name ${t1Win?'winner':''}">${escapeHtml(g.team1)}${t1Win?'<span class="trophy">🏆</span>':''}</span>
<span class="team-score">${formatNumber(g.team1Score)}</span>
</div>
<div class="center-info">
<span class="vs">VS</span>
<span class="tap">Tap for box score</span>
</div>
<div class="team-side" style="text-align:right;">
<span class="team-name ${t2Win?'winner':''}">${escapeHtml(g.team2)}${t2Win?'<span class="trophy">🏆</span>':''}</span>
<span class="team-score">${formatNumber(g.team2Score)}</span>
</div>
</div>
</div>`;
}).join('')}</div>`;

els.liveRow.onclick=e=>{
const row=e.target.closest('.live-row-item');
if(!row)return;
const game=games[+row.dataset.index];
const s1=Number(game.team1Score),s2=Number(game.team2Score);
const t1Win=s1<s2,t2Win=s2<s1;

const tbl=(players,name,score,win)=>`
<div class="boxscore-card">
<div class="boxscore-team">
<span class="${win?'winner':''}">${escapeHtml(name)}${win?'<span class="trophy">🏆</span>':''}</span>
<span class="boxscore-score">${formatNumber(score)}</span>
</div>
<div class="boxscore-row header-row"><span>Player</span><span>Rank</span></div>
${players.map(p=>`
<div class="boxscore-row">
<span>${escapeHtml(p.player)} ${p.captain?'<span style="color:#ffb347;font-size:10px;">CPT</span>':''}</span>
<span>${formatNumber(p.rank)}</span>
</div>`).join('')}
</div>`;

els.liveDetails.innerHTML=tbl(game.team1Players,game.team1,game.team1Score,t1Win)+tbl(game.team2Players,game.team2,game.team2Score,t2Win);
els.liveModal.hidden=false;
};
}

async function fetchSheet(url){
const res=await fetch(url,{cache:'no-store'});
if(!res.ok) throw new Error("Fetch failed");
return parseCSV(await res.text());
}

async function loadData(){
try{
const [liveData,scheduleData]=await Promise.all([fetchSheet(LIVE_SCORING_URL),fetchSheet(SCHEDULE_URL)]);
renderLiveScoring(liveData,scheduleData);
renderSchedule(scheduleData);
}catch(err){
els.liveRow.innerHTML='<p>Failed to load data.</p>';
}
}

document.addEventListener('click',e=>{
if(e.target.matches("[data-close='true']")) els.liveModal.hidden=true;
});

loadData();
</script>
</body>
</html>
