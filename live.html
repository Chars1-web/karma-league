<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League – Live Scores</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial,sans-serif; text-align:center; padding:20px; }
    h1 { font-size:48px; margin-bottom:40px; }
    .live-list { display:flex; flex-direction:column; align-items:center; }
   .live-row-item {
  background:white; 
  color:black; 
  border-radius:20px; 
  padding:30px;       /* bigger padding */
  margin:20px auto;   /* more space between boxes */
  width:95%;          /* almost full width */
  max-width:600px;    /* bigger max width */
  font-size:26px;     /* larger text */
  cursor:pointer; 
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 10px rgba(255,255,255,0.1); /* subtle shadow */
}
    .live-row-item:hover { transform:scale(1.05); }
    .live-matchup { display:flex; justify-content:center; align-items:center; gap:10px; flex-wrap:wrap; }
    .team-name { display:flex; align-items:center; gap:6px; }
    .team-score { font-size:18px; color:#555; font-weight:normal; }
    .vs { font-size:16px; color:#888; }
    /* Modal */
   #live-modal {
  position: fixed;
  top: 0; 
  left: 0; 
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95); /* slightly darker */
  display: flex;
  flex-direction: column;
  justify-content: center; /* center vertically */
  align-items: center;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
  z-index: 1000;
}
    #live-modal[hidden] { display:none; }
 #live-details {
  width: 95%;           /* almost full width */
  max-width: 900px;     /* bigger than before */
  background: white;
  color: black;
  border-radius: 20px;
  padding: 25px;
  font-size: 20px;
  text-align: left;
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}
  <style>
  body { background:#0a0a0a; color:white; }

  .home-link {
    display:inline-block;
    margin-top:20px;
    font-size:24px;
    padding:12px 25px;
    background:gold;
    color:black;
    border-radius:12px;
    text-decoration:none;
  }
</style>
</head>
<body>
<h1>Ascended Karma League – Live Scores</h1>
<div id="live-scoring"><p>Loading...</p></div>
<div id="live-modal" hidden>
  <button class="close-btn" data-close="true">Close</button>
  <div id="live-details"></div>
</div>
<script src="app.js"></script>



      
<div id="teamBox" class="team-box"></div>

<a href="index.html" class="home-link">Home</a>

</body>
</html>
