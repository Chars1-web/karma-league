<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--gold:#ffd54a;
--text:#f5f5f5;
--muted:#7f8598;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:radial-gradient(circle at top center, rgba(255,213,74,.06), transparent 30%),linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
}

header{
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
}

.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
}
h1 span{color:var(--accent);}

.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,213,74,.08);
border:1px solid rgba(255,213,74,.28);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--gold);
}

main{
max-width:760px;
margin:auto;
padding:28px 14px 80px;
}

.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{
flex:1;
padding:11px;
text-align:center;
font-size:12px;
font-weight:700;
letter-spacing:.07em;
text-transform:uppercase;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--muted);
cursor:pointer;
}
.tab.active{background:var(--accent);color:#000;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}

.live-list{display:flex;flex-direction:column;gap:16px;}

.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.02), rgba(255,255,255,.008));
border:1px solid var(--border);
border-radius:18px;
padding:20px;
cursor:pointer;
transition:.2s;
}
.live-row-item:hover{transform:translateY(-3px);border-color:rgba(255,213,74,.4);}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
text-align:center;
gap:8px;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
}

.team-score{
font-size:15px;
font-weight:800;
color:var(--accent);
}

.winner{
color:var(--gold);
text-shadow:0 0 8px rgba(255,213,74,.7),0 0 20px rgba(255,213,74,.5);
animation:goldPulse 1.4s infinite alternate;
}

@keyframes goldPulse{
from{opacity:.8;}
to{opacity:1;}
}

.trophy{
margin-left:5px;
filter:drop-shadow(0 0 8px rgba(255,213,74,.8));
}

.vs{
font-family:'Bebas Neue',sans-serif;
font-size:15px;
color:var(--muted);
}

.diff{
margin-top:5px;
font-size:11px;
font-weight:700;
color:var(--gold);
letter-spacing:.08em;
text-transform:uppercase;
}

.projection{
margin-top:16px;
}

.proj-label{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:6px;
}

.bar-wrap{
height:10px;
background:#1b1f2a;
border-radius:999px;
overflow:hidden;
}
.bar-fill{
height:100%;
background:linear-gradient(to right,var(--gold),#fff1a6);
}

.mvp{
margin-top:14px;
font-size:12px;
font-weight:700;
text-align:center;
color:var(--gold);
}

.schedule-group{margin-bottom:28px;}
.schedule-date{
font-family:'Bebas Neue',sans-serif;
font-size:20px;
color:var(--accent);
margin-bottom:10px;
border-bottom:1px solid var(--border);
padding-bottom:8px;
}
.schedule-row{
display:flex;
align-items:center;
gap:12px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px 16px;
margin-bottom:8px;
}
.sched-team{flex:1;font-family:'Bebas Neue',sans-serif;font-size:20px;}
.sched-team.right{text-align:right;}
.sched-vs{font-size:11px;color:var(--muted);}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}
#live-modal[hidden]{display:none;}
.modal-inner{width:100%;max-width:560px;}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}
.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
color:var(--gold);
}
.close-btn{
background:var(--card);
border:1px solid var(--border);
color:white;
padding:8px 15px;
border-radius:999px;
cursor:pointer;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
display:flex;
justify-content:space-between;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}

.top-player{
color:var(--gold);
font-weight:800;
text-shadow:0 0 8px rgba(255,213,74,.5);
}

.spinner{
display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

footer{text-align:center;padding-bottom:45px;}
footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:white;
font-size:12px;
}
</style>
</head>

<body>

<header>
<div class="header-top">Official KRL Live Scoring Site</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>
<div id="live-badge">● Live Games In Progress</div>
</header>

<main>
<div class="tabs">
<div class="tab active" data-tab="live">🔴 Live</div>
<div class="tab" data-tab="schedule">Schedule</div>
</div>

<div id="tab-live" class="tab-content active">
<div class="section-title">Today's Matchups</div>
<div id="live-scoring"><p><span class="spinner"></span> Loading...</p></div>
</div>

<div id="tab-schedule" class="tab-content">
<div class="section-title">Full Schedule</div>
<div id="schedule-content"><p><span class="spinner"></span> Loading...</p></div>
</div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer><a href="index.html">← Back to Home</a></footer>

<script>
function parseCSV(text){const rows=[];let row=[],value="",inQuotes=false;for(let i=0;i<text.length;i++){const char=text[i],next=text[i+1];if(char=='"'){if(inQuotes&&next=='"'){value+='"';i++;}else inQuotes=!inQuotes;continue;}if(char==','&&!inQuotes){row.push(value.trim());value="";continue;}if((char=='\n'||char=='\r')&&!inQuotes){if(char=='\r'&&next=='\n')i++;row.push(value.trim());if(row.length>1||row[0]!=='')rows.push(row);row=[];value="";continue;}value+=char;}if(value.length||row.length){row.push(value.trim());rows.push(row);}return rows;}
function formatNumber(num){if(num===null||num===undefined||num==='')return'';const n=Number(num);if(isNaN(n))return num;return n.toLocaleString();}
function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isCaptain(name){const s=String(name||'').trim();return /\(C\)/i.test(s)||/^C\s+/.test(s)||/\s+C$/.test(s);}
function cleanName(name){return String(name||'').replace(/\(C\)/gi,'').replace(/^C\s+/,'').replace(/\s+C$/,'').trim();}
function colToIndex(letter){return letter.toUpperCase().charCodeAt(0)-65;}
function sliceRange(rows,range){const m=range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i);if(!m)return[];const sc=colToIndex(m[1]),ec=colToIndex(m[3]),sr=+m[2]-1,er=+m[4]-1;return rows.slice(sr,er+1).map(r=>r.slice(sc,ec+1));}
function parseTeamHeader(raw){const str=String(raw||'').trim();const match=str.match(/^(.+?)\s*\(([^)]+)\)\s*$/);if(match)return{name:match[1].trim(),score:match[2].trim()};return{name:str,score:null};}

const LIVE_SCORING_URL="/api/sheet?name=live-scoring";
const SCHEDULE_URL="/api/sheet?name=schedule";
const els={liveRow:document.getElementById("live-scoring"),liveModal:document.getElementById("live-modal"),liveDetails:document.getElementById("live-details")};

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('tab-'+t.dataset.tab).classList.add('active');});

function renderSchedule(rows){
const c=document.getElementById("schedule-content");
const matchups=rows.slice(1).map(r=>({date:r[0],team1:r[1],team2:r[2]})).filter(m=>m.team1&&m.team2);
const grouped={};matchups.forEach(m=>{if(!grouped[m.date])grouped[m.date]=[];grouped[m.date].push(m);});
c.innerHTML=Object.keys(grouped).map(date=>`<div class="schedule-group"><div class="schedule-date">${date}</div>${grouped[date].map(m=>`<div class="schedule-row"><span class="sched-team">${m.team1}</span><span class="sched-vs">vs</span><span class="sched-team right">${m.team2}</span></div>`).join('')}</div>`).join('');
}

function parseLiveGames(rows){
const RANGES=["A5:G10","A12:G17","A19:G24","A26:G31","A33:G38","A40:G45","A47:G52","A54:G59","A61:G66","A68:G73","A75:G80","A82:G87","A89:G94","A96:G101","A103:G108"];
const games=[];
RANGES.forEach(range=>{
const block=sliceRange(rows,range); if(!block.length)return;
let team1Raw='',team2Raw='',headerIndex=0;
for(let i=0;i<block.length;i++){
const left=String(block[i][0]||'').trim();
const right=String(block[i][4]||'').trim();
if(left&&right&&!left.startsWith('@')&&!right.startsWith('@')){team1Raw=left;team2Raw=right;headerIndex=i;break;}
}
if(!team1Raw||!team2Raw)return;
const t1=parseTeamHeader(team1Raw),t2=parseTeamHeader(team2Raw);
const playerRows=block.slice(headerIndex+1);

const build=(nameCol,rankCol)=>playerRows.map(r=>{
const raw=String(r[nameCol]||'').trim();
if(!raw)return null;
const captain=isCaptain(raw);
const rank=parseFloat(r[rankCol]);
const adj=isNaN(rank)?null:(captain?rank/1.5:rank);
return {player:cleanName(raw),rank,adj,captain};
}).filter(Boolean);

const team1Players=build(0,2);
const team2Players=build(4,6);

const sum=arr=>Math.round(arr.reduce((s,p)=>s+(p.adj||0),0));

games.push({team1:t1.name,team2:t2.name,team1Players,team2Players,team1Score:sum(team1Players),team2Score:sum(team2Players)});
});
return games;
}

function renderLiveScoring(liveRows){
const games=parseLiveGames(liveRows);
document.getElementById("live-badge").style.display='inline-block';

els.liveRow.innerHTML=`<div class="live-list">${games.map((g,i)=>{
const t1Win=g.team1Score<g.team2Score;
const t2Win=g.team2Score<g.team1Score;
const diff=Math.abs(g.team1Score-g.team2Score);

const total=g.team1Score+g.team2Score;
const t1Pct=Math.round((g.team2Score/total)*100);
const t2Pct=100-t1Pct;

const allPlayers=[...g.team1Players.map(p=>({...p,team:g.team1})),...g.team2Players.map(p=>({...p,team:g.team2}))];
const top=allPlayers.sort((a,b)=>a.rank-b.rank)[0];

return `<div class="live-row-item" data-index="${i}">
<div class="live-matchup">
<div>
<div class="team-name ${t1Win?'winner':''}">${g.team1}${t1Win?'<span class="trophy">🏆</span>':''}</div>
<div class="team-score">${formatNumber(g.team1Score)}</div>
</div>
<div>
<div class="vs">VS</div>
<div class="diff">Leads by ${formatNumber(diff)}</div>
</div>
<div style="text-align:right;">
<div class="team-name ${t2Win?'winner':''}">${g.team2}${t2Win?'<span class="trophy">🏆</span>':''}</div>
<div class="team-score">${formatNumber(g.team2Score)}</div>
</div>
</div>

<div class="projection">
<div class="proj-label">Projected Winner • ${t1Win?g.team1:g.team2}</div>
<div class="bar-wrap"><div class="bar-fill" style="width:${Math.max(t1Pct,t2Pct)}%"></div></div>
</div>

<div class="mvp">⭐ TOP PERFORMER — ${top.player} (${formatNumber(top.rank)})</div>
</div>`;
}).join('')}</div>`;

els.liveRow.onclick=e=>{
const row=e.target.closest('.live-row-item'); if(!row)return;
const game=games[+row.dataset.index];
const all=[...game.team1Players,...game.team2Players];
const best=all.sort((a,b)=>a.rank-b.rank)[0];

const tbl=(players,name,score,win)=>`
<div class="boxscore-card">
<div class="boxscore-team"><span class="${win?'winner':''}">${name}${win?'<span class="trophy">🏆</span>':''}</span><span>${formatNumber(score)}</span></div>
${players.map(p=>`<div class="boxscore-row">
<span class="${p.player===best.player?'top-player':''}">${p.player} ${p.captain?'CPT':''}</span>
<span class="${p.player===best.player?'top-player':''}">${formatNumber(p.rank)}</span>
</div>`).join('')}
</div>`;

els.liveDetails.innerHTML=tbl(game.team1Players,game.team1,game.team1Score,game.team1Score<game.team2Score)+tbl(game.team2Players,game.team2,game.team2Score,game.team2Score<game.team1Score);
els.liveModal.hidden=false;
};
}

async function fetchSheet(url){const res=await fetch(url,{cache:'no-store'});return parseCSV(await res.text());}
async function loadData(){const [live,schedule]=await Promise.all([fetchSheet(LIVE_SCORING_URL),fetchSheet(SCHEDULE_URL)]);renderLiveScoring(live);renderSchedule(schedule);}
document.addEventListener('click',e=>{if(e.target.matches("[data-close='true']"))els.liveModal.hidden=true;});
loadData();
</script>
</body>
</html>
