<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--accentSoft:rgba(232,255,60,.15);
--red:#ff4a72;
--green:#4dff9d;
--text:#f5f5f5;
--muted:#7f8598;
--gold:#ffd95c;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top center, rgba(232,255,60,.05), transparent 30%),
linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
background-size:32px 32px;
pointer-events:none;
}

header{
position:relative;
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
z-index:2;
}

.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
letter-spacing:.04em;
line-height:1;
}

h1 span{color:var(--accent);}

.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,74,114,.08);
border:1px solid rgba(255,74,114,.28);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--red);
}

main{
position:relative;
z-index:2;
max-width:760px;
margin:auto;
padding:28px 14px 80px;
}

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}

#live-scoring p{
text-align:center;
padding:70px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:14px;
}

.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.015), rgba(255,255,255,.005));
border:1px solid var(--border);
border-radius:18px;
padding:22px 18px;
cursor:pointer;
transition:.22s;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.22);
}

.live-row-item:before{
content:'';
position:absolute;
left:0;top:0;bottom:0;
width:4px;
background:var(--accent);
transform:scaleY(0);
transition:.22s;
}

.live-row-item:hover{
transform:translateY(-3px);
border-color:rgba(232,255,60,.35);
box-shadow:0 14px 36px rgba(0,0,0,.3);
}

.live-row-item:hover:before{
transform:scaleY(1);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:8px;
text-align:center;
}

.team-side{
display:flex;
flex-direction:column;
gap:5px;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:.04em;
line-height:1;
}

.team-score{
font-size:14px;
font-weight:800;
color:var(--accent);
}

.center-info{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.vs{
font-family:'Bebas Neue',sans-serif;
font-size:16px;
letter-spacing:.18em;
color:var(--muted);
}

.tap{
font-size:9px;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}

#live-modal[hidden]{display:none;}

.modal-inner{
width:100%;
max-width:560px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
letter-spacing:.08em;
color:var(--gold);
}

.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 15px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
display:flex;
justify-content:space-between;
align-items:center;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
padding-bottom:12px;
margin-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-score{
font-size:16px;
color:var(--accent);
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}

.header-row{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
}

footer{
position:relative;
z-index:2;
text-align:center;
padding-bottom:45px;
}

footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="header-top">Official Fantasy Sports Network</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>
<div id="live-badge">● Live Games In Progress</div>
</header>

<main>
<div class="section-title">Today's Matchups</div>
<div id="live-scoring"><p>Loading live scores...</p></div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script src="app.js"></script>
</body>
</html>
