<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#06070b;
--card:#10131a;
--border:#1c2130;
--accent:#e8ff3c;
--red:#ff3c6e;
--green:#47ff8a;
--text:#f3f3f3;
--muted:#7b8092;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:linear-gradient(to bottom,#050508,#090b11);
font-family:'DM Sans',sans-serif;
color:var(--text);
min-height:100vh;
}

header{
padding:34px 20px 24px;
text-align:center;
border-bottom:1px solid var(--border);
}

.top-small{
font-size:11px;
letter-spacing:.3em;
text-transform:uppercase;
color:var(--accent);
font-weight:700;
margin-bottom:8px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:58px;
letter-spacing:.04em;
}

h1 span{color:var(--accent);}

#live-badge{
display:none;
margin-top:12px;
padding:6px 14px;
border-radius:999px;
background:rgba(255,60,110,.1);
border:1px solid rgba(255,60,110,.3);
font-size:11px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--red);
}

main{
max-width:650px;
margin:auto;
padding:24px 14px 70px;
}

#live-scoring p{
text-align:center;
padding:60px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:12px;
}

.live-row-item{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px 20px;
cursor:pointer;
transition:.2s;
}

.live-row-item:hover{
border-color:rgba(232,255,60,.35);
transform:translateY(-2px);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:10px;
text-align:center;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
letter-spacing:.04em;
}

.team-score{
font-size:13px;
color:var(--accent);
margin-left:6px;
}

.vs{
font-size:12px;
letter-spacing:.2em;
color:var(--muted);
text-transform:uppercase;
}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.86);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}

#live-modal[hidden]{display:none;}

.modal-inner{
width:100%;
max-width:520px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
color:var(--accent);
}

.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 14px;
border-radius:999px;
cursor:pointer;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-score{
font-size:14px;
color:var(--accent);
margin-left:6px;
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:7px 2px;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,.03);
}

.header-row{
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--muted);
font-weight:700;
}

footer{
text-align:center;
padding-bottom:50px;
}

footer a{
display:inline-block;
padding:10px 20px;
border-radius:10px;
background:var(--card);
border:1px solid var(--border);
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="top-small">Fantasy Sports</div>
<h1>Karma <span>Rank</span> League</h1>
<div id="live-badge">● Live Scores</div>
</header>

<main>
<div id="live-scoring"><p>Loading live scores...</p></div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script>
<script>
function parseCSV(text) {
  const rows = [];
  let row = [], value = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i], next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') { value += '"'; i++; }
      else inQuotes = !inQuotes;
      continue;
    }
    if (char === ',' && !inQuotes) { row.push(value.trim()); value = ""; continue; }
    if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(value.trim());
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = []; value = "";
      continue;
    }
    value += char;
  }
  if (value.length || row.length) { row.push(value.trim()); rows.push(row); }
  return rows;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function normalizeTeamName(name) {
  return String(name || '')
    .replace(/\([^)]*\)/g, '')
    .replace(/[:*]/g, '')
    .replace(/[^a-zA-Z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim().toLowerCase();
}

function colToIndex(letter) {
  return letter.toUpperCase().charCodeAt(0) - 65;
}

function sliceRange(rows, range) {
  const match = range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i);
  if (!match) return [];
  const startCol = colToIndex(match[1]), endCol = colToIndex(match[3]);
  const startRow = Number(match[2]) - 1, endRow = Number(match[4]) - 1;
  return rows.slice(startRow, endRow + 1).map(r => r.slice(startCol, endCol + 1));
}

function parseTeamHeader(raw) {
  const str = String(raw || '').trim();
  const match = str.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
  if (match) return { name: match[1].trim(), score: match[2].trim() };
  return { name: str, score: null };
}

function isCaptain(name) {
  const s = String(name || '').trim();
  return /\(C\)/i.test(s) || /^C\s+/.test(s) || /\s+C$/.test(s);
}

function cleanName(name) {
  return String(name || '')
    .replace(/\(C\)/gi, '')
    .replace(/^C\s+/, '')
    .replace(/\s+C$/, '')
    .trim();
}

const LIVE_SCORING_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?gid=712264809&single=true&output=csv";
const SCHEDULE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?gid=1186488561&single=true&output=csv";

const els = {
  liveRow: document.getElementById("live-scoring"),
  liveModal: document.getElementById("live-modal"),
  liveDetails: document.getElementById("live-details"),
};

function extractLeagueDay(rows) {
  const row = rows.find(r =>
    String(r[0] || '').includes('League Day') ||
    String(r[1] || '').includes('League Day')
  );
  if (!row) return '';
  const cell = String(row[0] || row[1] || '');
  const parts = cell.split(':');
  return parts.length > 1 ? parts[1].trim() : cell.trim();
}

function parseLiveGames(rows) {
  const RANGES = [
    "A5:G11","A13:G19","A21:G27","A29:G35","A37:G43",
    "A45:G51","A53:G59","A61:G67","A69:G75","A77:G83",
    "A85:G91","A93:G99","A101:G107","A109:G115","A117:G122"
  ];

  const games = [];
  RANGES.forEach(range => {
    const block = sliceRange(rows, range);
    if (!block.length) return;

    let team1Raw = '', team2Raw = '', headerIndex = 0;
    for (let i = 0; i < block.length; i++) {
      const c = block[i] || [];
      const left = String(c[0] || '').trim();
      const right = String(c[4] || '').trim();
      if (left && right && !left.startsWith('@') && !right.startsWith('@') &&
          !left.includes('League Day') && !right.includes('League Day')) {
        team1Raw = left;
        team2Raw = right;
        headerIndex = i;
        break;
      }
    }
    if (!team1Raw || !team2Raw) return;

    const t1 = parseTeamHeader(team1Raw);
    const t2 = parseTeamHeader(team2Raw);

    const playerRows = block.slice(headerIndex + 1)
      .filter(row => String(row[0] || row[4] || '').trim() !== '');

    const buildPlayers = (pRows, nameCol, rankCol) => pRows.map(r => {
      const rawName = String(r[nameCol] || '').trim();
      if (!rawName) return null;
      const captain = isCaptain(rawName);
      const name = cleanName(rawName);
      const rawRank = parseFloat(String(r[rankCol] || '').trim());
      const score = isNaN(rawRank) ? null : (captain ? rawRank / 1.5 : rawRank);
      return { player: name, rank: isNaN(rawRank) ? '' : String(rawRank), score, captain };
    }).filter(Boolean);

    const team1Players = buildPlayers(playerRows, 0, 2);
    const team2Players = buildPlayers(playerRows, 4, 6);

    const sumScore = (players) => {
      const valid = players.filter(p => p.score !== null);
      if (!valid.length) return null;
      return String(Math.round(valid.reduce((s, p) => s + p.score, 0)));
    };

    games.push({
      team1: t1.name,
      team2: t2.name,
      team1Score: sumScore(team1Players),
      team2Score: sumScore(team2Players),
      key: `${normalizeTeamName(t1.name)}|${normalizeTeamName(t2.name)}`,
      team1Players,
      team2Players,
    });
  });
  return games;
}

function getLiveScheduleIndexes(scheduleRows) {
  const headers = (scheduleRows[0] || []).map(h => String(h || '').trim().toLowerCase());
  const findIdx = checks => headers.findIndex(h => checks.some(c => h.includes(c)));
  let date = findIdx(['date']);
  let team1 = findIdx(['team 1','team1','away']);
  let team2 = findIdx(['team 2','team2','home']);
  if (team1 === -1 || team2 === -1) {
    date = 0; team1 = 1; team2 = 2;
  }
  return { date, team1, team2 };
}

function renderLiveScoring(liveRows, scheduleRows) {
  const leagueDay = extractLeagueDay(liveRows);
  const liveGames = parseLiveGames(liveRows);
  const liveMap = new Map(liveGames.map(g => [g.key, g]));
  const idx = getLiveScheduleIndexes(scheduleRows);

  let games = scheduleRows.slice(1)
    .filter(row => String(row[idx.date] || '').trim() === leagueDay)
    .map(row => {
      const team1 = String(row[idx.team1] || '').trim();
      const team2 = String(row[idx.team2] || '').trim();
      const key = `${normalizeTeamName(team1)}|${normalizeTeamName(team2)}`;
      const live = liveMap.get(key) || null;
      return live || { team1, team2, team1Score:null, team2Score:null, team1Players:[], team2Players:[] };
    });

  if (!games.length) games = liveGames;

  document.getElementById("live-badge").style.display = "inline-flex";
  window._liveGames = games;

  els.liveRow.innerHTML = `<div class="live-list">${games.map((g,i)=>`
    <div class="live-row-item" data-index="${i}">
      <div class="live-matchup">
        <span class="team-name">${escapeHtml(g.team1)} <span class="team-score">(${g.team1Score || '-'})</span></span>
        <span class="vs">VS</span>
        <span class="team-name">${escapeHtml(g.team2)} <span class="team-score">(${g.team2Score || '-'})</span></span>
      </div>
    </div>`).join('')}</div>`;

  els.liveRow.onclick = e => {
    const rowEl = e.target.closest('.live-row-item');
    if (!rowEl) return;
    const game = games[Number(rowEl.dataset.index)];

    const tbl = (players, name, score) => `
      <div class="boxscore-card">
        <div class="boxscore-team">${escapeHtml(name)} <span class="boxscore-score">(${score || '-'})</span></div>
        <div class="boxscore-row header-row"><span>Player</span><span>Rank</span></div>
        ${players.map(p=>`
          <div class="boxscore-row">
            <span>${escapeHtml(p.player)}</span>
            <span>${p.captain ? p.rank + ' → ' + Math.round(p.score) : p.rank}</span>
          </div>`).join('')}
      </div>`;

    els.liveDetails.innerHTML = tbl(game.team1Players, game.team1, game.team1Score) + tbl(game.team2Players, game.team2, game.team2Score);
    els.liveModal.hidden = false;
  };
}

async function fetchSheet(url){
  const res = await fetch(url);
  const rows = parseCSV(await res.text());
  return rows;
}

async function loadData(){
  try{
    const [liveData,scheduleData] = await Promise.all([fetchSheet(LIVE_SCORING_URL),fetchSheet(SCHEDULE_URL)]);
    renderLiveScoring(liveData,scheduleData);
  }catch(err){
    els.liveRow.textContent = "Failed to load: " + err.message;
    console.log(err);
  }
}

document.addEventListener("click",e=>{
  if(e.target.matches("[data-close='true']")) els.liveModal.hidden = true;
});

loadData();
</script>
