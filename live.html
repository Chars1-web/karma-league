<!DOCTYPE html>
<html>
<head>
  <title>Ascended Karma League – Live Scores</title>
  <style>
    body { background:#0a0a0a; color:white; font-family:Arial,sans-serif; text-align:center; padding:20px; }
    h1 { font-size:48px; margin-bottom:30px; }
    .matchup-box { background:white; color:black; border-radius:15px; padding:20px; margin:15px auto; width:90%; max-width:380px; font-size:24px; cursor:pointer; transition:0.2s; }
    .matchup-box:hover { transform:scale(1.05); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; flex-direction:column; padding:20px; }
    .modal-content { background:white; color:black; border-radius:15px; padding:20px; width:90%; max-width:500px; font-size:20px; margin-bottom:20px; text-align:left; }
    .close-btn { font-size:28px; border:none; background:red; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Ascended Karma League – Live Scores</h1>
<div id="matchups"></div>

<div id="modal" class="modal">
  <div id="modalContent" class="modal-content"></div>
  <button class="close-btn" onclick="closeModal()">❌ Close</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?output=csv";

const matchupsDiv = document.getElementById("matchups");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

Papa.parse(sheetURL, {
  download: true,
  complete: function(results) {
    const data = results.data;
    const matchups = [];

    // Loop through rows 4–13 (indices 3–12)
    for (let i = 3; i <= 12; i++) {
      const row = data[i];
      if(!row) continue;

      const teamA = row[0]; // column A
      const opponent = row[6]; // column G

      // Players B–F
      const playersA = row.slice(1,6).filter(cell => cell && cell.toString().trim() !== "").map(p=>{
        let [name, karma] = p.split("=");
        if(karma !== undefined) karma = parseFloat(karma.trim()); else karma=0;
        return {name: name.trim(), karma: karma};
      });

      matchups.push({teamA, playersA, opponent});
    }

    // Remove duplicate matchups (since opponent will also have a row)
    const displayed = new Set();

    matchups.forEach(m=>{
      const key = [m.teamA, m.opponent].sort().join("-");
      if(displayed.has(key)) return;
      displayed.add(key);

      const box = document.createElement("div");
      box.className = "matchup-box";
      box.textContent = `${m.teamA} vs ${m.opponent}`;

      box.onclick = () => {
        let html = `<strong>${m.teamA}</strong><br>`;
        let totalA=0;
        m.playersA.slice(0,5).forEach(p=>{
          let karma = p.karma;
          if(p.name.toLowerCase().includes("(c)")) karma *= 1.2;
          html += `${p.name} — ${karma.toFixed(1)}<br>`;
          totalA += karma;
        });
        html += `<br><strong>Total: ${totalA.toFixed(1)}</strong>`;

        modalContent.innerHTML = html;
        modal.style.display = "flex";
      };

      matchupsDiv.appendChild(box);
    });
  }
});

function closeModal(){ modal.style.display="none"; }
</script>

</body>
</html>
