<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#06070b;
--card:#10131a;
--border:#1c2130;
--accent:#e8ff3c;
--red:#ff3c6e;
--green:#47ff8a;
--text:#f3f3f3;
--muted:#7b8092;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:linear-gradient(to bottom,#050508,#090b11);
font-family:'DM Sans',sans-serif;
color:var(--text);
min-height:100vh;
}

header{
padding:34px 20px 24px;
text-align:center;
border-bottom:1px solid var(--border);
}

.top-small{
font-size:11px;
letter-spacing:.3em;
text-transform:uppercase;
color:var(--accent);
font-weight:700;
margin-bottom:8px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:58px;
letter-spacing:.04em;
}

h1 span{color:var(--accent);}

#live-badge{
display:none;
margin-top:12px;
padding:6px 14px;
border-radius:999px;
background:rgba(255,60,110,.1);
border:1px solid rgba(255,60,110,.3);
font-size:11px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--red);
}

main{
max-width:650px;
margin:auto;
padding:24px 14px 70px;
}

#live-scoring p{
text-align:center;
padding:60px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:12px;
}

.live-row-item{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px 20px;
cursor:pointer;
transition:.2s;
}

.live-row-item:hover{
border-color:rgba(232,255,60,.35);
transform:translateY(-2px);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:10px;
text-align:center;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
letter-spacing:.04em;
}

.team-score{
font-size:13px;
color:var(--accent);
margin-left:6px;
}

.vs{
font-size:12px;
letter-spacing:.2em;
color:var(--muted);
text-transform:uppercase;
}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.86);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}

#live-modal[hidden]{display:none;}

.modal-inner{
width:100%;
max-width:520px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
color:var(--accent);
}

.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 14px;
border-radius:999px;
cursor:pointer;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
margin-bottom:12px;
padding-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-score{
font-size:14px;
color:var(--accent);
margin-left:6px;
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:7px 2px;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,.03);
}

.header-row{
font-size:10px;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--muted);
font-weight:700;
}

footer{
text-align:center;
padding-bottom:50px;
}

footer a{
display:inline-block;
padding:10px 20px;
border-radius:10px;
background:var(--card);
border:1px solid var(--border);
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.1em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="top-small">Fantasy Sports</div>
<h1>Karma <span>Rank</span> League</h1>
<div id="live-badge">● Live Scores</div>
</header>

<main>
<div id="live-scoring"><p>Loading live scores...</p></div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script>
