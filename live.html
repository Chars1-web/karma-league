<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--accentSoft:rgba(232,255,60,.15);
--red:#ff4a72;
--green:#4dff9d;
--text:#f5f5f5;
--muted:#7f8598;
--gold:#ffd95c;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top center, rgba(232,255,60,.05), transparent 30%),
linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
background-size:32px 32px;
pointer-events:none;
}

header{
position:relative;
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
z-index:2;
}

.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
letter-spacing:.04em;
line-height:1;
}

h1 span{color:var(--accent);}

.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,74,114,.08);
border:1px solid rgba(255,74,114,.28);
font-size:11px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--red);
}

main{
position:relative;
z-index:2;
max-width:760px;
margin:auto;
padding:28px 14px 80px;
}

/* Tabs */
.tabs{
display:flex;
gap:8px;
margin-bottom:24px;
}
.tab{
flex:1;
padding:11px 6px;
text-align:center;
font-size:12px;
font-weight:700;
letter-spacing:.07em;
text-transform:uppercase;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:var(--muted);
cursor:pointer;
transition:all .2s;
}
.tab.active{background:var(--accent);color:#050508;border-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}

#live-scoring p{
text-align:center;
padding:70px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:14px;
}

.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.015), rgba(255,255,255,.005));
border:1px solid var(--border);
border-radius:18px;
padding:22px 18px;
cursor:pointer;
transition:.22s;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.22);
}

.live-row-item:before{
content:'';
position:absolute;
left:0;top:0;bottom:0;
width:4px;
background:var(--accent);
transform:scaleY(0);
transition:.22s;
}

.live-row-item:hover{
transform:translateY(-3px);
border-color:rgba(232,255,60,.35);
box-shadow:0 14px 36px rgba(0,0,0,.3);
}

.live-row-item:hover:before{
transform:scaleY(1);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:8px;
text-align:center;
}

.team-side{
display:flex;
flex-direction:column;
gap:5px;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:.04em;
line-height:1;
}

.team-score{
font-size:14px;
font-weight:800;
color:var(--accent);
}

.center-info{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.vs{
font-family:'Bebas Neue',sans-serif;
font-size:16px;
letter-spacing:.18em;
color:var(--muted);
}

.tap{
font-size:9px;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}

/* Schedule */
.schedule-group{margin-bottom:28px;}
.schedule-date{
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:.06em;
color:var(--accent);
margin-bottom:10px;
padding-bottom:8px;
border-bottom:1px solid var(--border);
}
.schedule-row{
display:flex;
align-items:center;
gap:12px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px 16px;
margin-bottom:8px;
}
.sched-team{
flex:1;
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:.04em;
}
.sched-vs{
font-size:11px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}
.sched-team.right{text-align:right;}

/* Modal */
#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}

#live-modal[hidden]{display:none;}

.modal-inner{
width:100%;
max-width:560px;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
letter-spacing:.08em;
color:var(--gold);
}

.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 15px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}

.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}

.boxscore-team{
display:flex;
justify-content:space-between;
align-items:center;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
padding-bottom:12px;
margin-bottom:10px;
border-bottom:1px solid var(--border);
}

.boxscore-score{
font-size:16px;
color:var(--accent);
}

.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}

.header-row{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
}

.boxscore-empty{color:var(--muted);font-style:italic;font-size:13px;padding:8px 0;}

.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{
position:relative;
z-index:2;
text-align:center;
padding-bottom:45px;
}

footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="header-top">Official KRL Live Scoring Site</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>
<div id="live-badge">● Live Games In Progress</div>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-tab="live">🔴 Live</div>
    <div class="tab" data-tab="schedule">Schedule</div>
  </div>

  <!-- Live Tab -->
  <div id="tab-live" class="tab-content active">
    <div class="section-title">Today's Matchups</div>
    <div id="live-scoring"><p><span class="spinner"></span> Loading live scores...</p></div>
  </div>

  <!-- Schedule Tab -->
  <div id="tab-schedule" class="tab-content">
    <div class="section-title">Full Schedule</div>
    <div id="schedule-content"><p style="text-align:center;padding:48px 0;color:var(--muted);"><span class="spinner"></span> Loading schedule...</p></div>
  </div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>
<button class="close-btn" data-close="true">Close</button>
</div>
<div id="live-details"></div>
</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], value = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i], next = text[i + 1];
    if (char === '"') {
      if (inQuotes && next === '"') { value += '"'; i++; }
      else inQuotes = !inQuotes;
      continue;
    }
    if (char === ',' && !inQuotes) { row.push(value.trim()); value = ""; continue; }
    if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(value.trim());
      if (row.length > 1 || row[0] !== '') rows.push(row);
      row = []; value = "";
      continue;
    }
    value += char;
  }
  if (value.length || row.length) { row.push(value.trim()); rows.push(row); }
  return rows;
}

function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isCaptain(name) {
  const s = String(name || '').trim();
  return /\(C\)/i.test(s) || /^C\s+/.test(s) || /\s+C$/.test(s);
}

function cleanName(name) {
  return String(name || '').replace(/\(C\)/gi, '').replace(/^C\s+/, '').replace(/\s+C$/, '').trim();
}

function normalizeTeamName(name) {
  return String(name || '').replace(/\([^)]*\)/g, '').replace(/[:*]/g, '').replace(/[^a-zA-Z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
}

function colToIndex(letter) { return letter.toUpperCase().charCodeAt(0) - 65; }

function sliceRange(rows, range) {
  const match = range.match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i);
  if (!match) return [];
  const startCol = colToIndex(match[1]), endCol = colToIndex(match[3]);
  const startRow = Number(match[2]) - 1, endRow = Number(match[4]) - 1;
  return rows.slice(startRow, endRow + 1).map(r => r.slice(startCol, endCol + 1));
}

function parseTeamHeader(raw) {
  const str = String(raw || '').trim();
  const match = str.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
  if (match) return { name: match[1].trim(), score: match[2].trim() };
  return { name: str, score: null };
}

// ── Config ────────────────────────────────────────────────────────────────────
const LIVE_SCORING_URL = "/api/sheet?name=live-scoring";
const SCHEDULE_URL     = "/api/sheet?name=schedule";

const els = {
  liveRow:     document.getElementById("live-scoring"),
  liveModal:   document.getElementById("live-modal"),
  liveDetails: document.getElementById("live-details"),
};

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

// ── Schedule ──────────────────────────────────────────────────────────────────
function renderSchedule(rows) {
  const container = document.getElementById('schedule-content');
  // Skip row 1 (header), col A = date, col B = team1, col C = team2
  const matchups = rows.slice(1).map(r => ({
    date:  (r[0] || '').trim() || 'TBD',
    team1: (r[1] || '').trim(),
    team2: (r[2] || '').trim(),
  })).filter(m => m.team1 && m.team2);

  if (!matchups.length) { container.innerHTML = '<p style="text-align:center;color:var(--muted);padding:48px 0;">No schedule available.</p>'; return; }

  // Group by date
  const grouped = {};
  matchups.forEach(m => {
    if (!grouped[m.date]) grouped[m.date] = [];
    grouped[m.date].push(m);
  });

  container.innerHTML = Object.keys(grouped).map(date => `
    <div class="schedule-group">
      <div class="schedule-date">${escapeHtml(date)}</div>
      ${grouped[date].map(m => `
        <div class="schedule-row">
          <span class="sched-team">${escapeHtml(m.team1)}</span>
          <span class="sched-vs">vs</span>
          <span class="sched-team right">${escapeHtml(m.team2)}</span>
        </div>`).join('')}
    </div>`).join('');
}

// ── Live Scoring ──────────────────────────────────────────────────────────────
function extractLeagueDay(rows) {
  const row = rows.find(r => String(r[0]||'').includes('League Day') || String(r[1]||'').includes('League Day'));
  if (!row) return '';
  const cell = String(row[0] || row[1] || '');
  const parts = cell.split(':');
  return parts.length > 1 ? parts[1].trim() : cell.trim();
}

function parseLiveGames(rows) {
  const RANGES = [
    "A5:G11","A13:G19","A21:G27","A29:G35","A37:G43",
    "A45:G51","A53:G59","A61:G67","A69:G75","A77:G83",
    "A85:G91","A93:G99","A101:G107","A109:G115","A117:G122",
  ];
  const games = [];
  RANGES.forEach(range => {
    const block = sliceRange(rows, range);
    if (!block.length) return;
    let team1Raw = '', team2Raw = '', headerIndex = 0;
    for (let i = 0; i < block.length; i++) {
      const c = block[i] || [];
      const left  = String(c[0]||'').trim();
      const right = String(c[4]||'').trim();
      if (left && right && !left.startsWith('@') && !right.startsWith('@') &&
          !left.includes('League Day') && !right.includes('League Day')) {
        team1Raw = left; team2Raw = right; headerIndex = i; break;
      }
    }
    if (!team1Raw || !team2Raw) return;
    const t1 = parseTeamHeader(team1Raw);
    const t2 = parseTeamHeader(team2Raw);
    const playerRows = block.slice(headerIndex + 1).filter(row => String(row[0]||row[4]||'').trim() !== '');

    const buildPlayers = (pRows, nameCol, rankCol) => pRows.map(r => {
      const rawName = String(r[nameCol]||'').trim();
      if (!rawName) return null;
      const captain = isCaptain(rawName);
      const name    = cleanName(rawName);
      const rawRank = parseFloat(String(r[rankCol]||'').trim());
      const score   = isNaN(rawRank) ? null : (captain ? rawRank / 1.5 : rawRank);
      return { player: name, rank: isNaN(rawRank) ? '' : String(rawRank), score, captain };
    }).filter(Boolean);

    const team1Players = buildPlayers(playerRows, 0, 2);
    const team2Players = buildPlayers(playerRows, 4, 6);

    const sumScore = players => {
      const valid = players.filter(p => p.score !== null);
      if (!valid.length) return null;
      return String(Math.round(valid.reduce((s, p) => s + p.score, 0)));
    };

    games.push({
      team1: t1.name, team2: t2.name,
      team1Score: sumScore(team1Players),
      team2Score: sumScore(team2Players),
      key: `${normalizeTeamName(t1.name)}|${normalizeTeamName(t2.name)}`,
      team1Players, team2Players,
    });
  });
  return games;
}

function getLiveScheduleIndexes(scheduleRows) {
  const headers = (scheduleRows[0]||[]).map(h => String(h||'').trim().toLowerCase());
  const findIdx = checks => headers.findIndex(h => checks.some(c => h.includes(c)));
  let date  = findIdx(['date']);
  let team1 = findIdx(['team 1','team1','away']);
  let team2 = findIdx(['team 2','team2','home']);
  if (team1 === -1 || team2 === -1) {
    if ((scheduleRows[0]||[]).length >= 4) { if (date===-1) date=1; if (team1===-1) team1=2; if (team2===-1) team2=3; }
    else { if (date===-1) date=0; if (team1===-1) team1=1; if (team2===-1) team2=2; }
  }
  return { date, team1, team2 };
}

function renderLiveScoring(liveRows, scheduleRows) {
  if (!liveRows.length) { els.liveRow.textContent = 'No live scoring available.'; return; }
  const leagueDay  = extractLeagueDay(liveRows);
  const liveGames  = parseLiveGames(liveRows);
  const liveMap    = new Map(liveGames.map(g => [g.key, g]));
  const idx        = getLiveScheduleIndexes(scheduleRows);

  let games = scheduleRows.slice(1)
    .filter(row => String(row[idx.date]||'').trim() === leagueDay)
    .map(row => {
      const team1 = String(row[idx.team1]||'').trim();
      const team2 = String(row[idx.team2]||'').trim();
      const key   = `${normalizeTeamName(team1)}|${normalizeTeamName(team2)}`;
      const live  = liveMap.get(key) || null;
      return { team1, team2,
        team1Score:   live ? live.team1Score   : null,
        team2Score:   live ? live.team2Score   : null,
        team1Players: live ? live.team1Players : [],
        team2Players: live ? live.team2Players : [],
      };
    });

  if (!games.length) games = liveGames;
  if (!games.length) { els.liveRow.textContent = 'No live games found.'; return; }

  const liveBadge = document.getElementById('live-badge');
  if (liveBadge) liveBadge.style.display = 'inline-block';

  const scoreBadge = score => score !== null ? `<span class="team-score">${escapeHtml(score)}</span>` : '';

  window._liveGames = games;
  els.liveRow.innerHTML = `<div class="live-list">${games.map((g, i) => `
    <div class="live-row-item" data-index="${i}">
      <div class="live-matchup">
        <div class="team-side">
          <span class="team-name">${escapeHtml(g.team1)}</span>
          ${scoreBadge(g.team1Score)}
        </div>
        <div class="center-info">
          <span class="vs">VS</span>
          <span class="tap">Tap for box score</span>
        </div>
        <div class="team-side" style="text-align:right;">
          <span class="team-name">${escapeHtml(g.team2)}</span>
          ${scoreBadge(g.team2Score)}
        </div>
      </div>
    </div>`).join('')}</div>`;

  els.liveRow.onclick = event => {
    const rowEl = event.target.closest('.live-row-item');
    if (!rowEl) return;
    const game = games[Number(rowEl.dataset.index)];
    if (!game) return;

    const s1 = parseFloat(game.team1Score);
    const s2 = parseFloat(game.team2Score);
    const t1Color = !isNaN(s1)&&!isNaN(s2) ? (s1<s2?'color:var(--green)':s1>s2?'color:var(--red)':'') : '';
    const t2Color = !isNaN(s1)&&!isNaN(s2) ? (s2<s1?'color:var(--green)':s2>s1?'color:var(--red)':'') : '';

    const tbl = (players, name, score, nameColor) => `
      <div class="boxscore-card">
        <div class="boxscore-team">
          <span style="${nameColor}">${escapeHtml(name)}</span>
          ${score !== null ? `<span class="boxscore-score">${escapeHtml(score)}</span>` : ''}
        </div>
        <div class="boxscore-row header-row"><span>Player</span><span>Rank</span></div>
        ${players.filter(p => p.player).map(p => {
          const rawRank = parseFloat(p.rank);
          const boosted = p.captain && !isNaN(rawRank) ? Math.round(rawRank / 1.5) : null;
          const rankDisplay = p.captain
            ? (boosted !== null ? escapeHtml(p.rank) + ' → ' + boosted : '—')
            : (escapeHtml(p.rank) || '—');
          return `<div class="boxscore-row">
            <span>${escapeHtml(p.player)}${p.captain ? ' <span style="color:#ff9f1c;font-size:10px;font-weight:700;background:rgba(255,159,28,.15);border-radius:4px;padding:1px 5px;">CPT</span>' : ''}</span>
            <span>${rankDisplay}</span>
          </div>`;
        }).join('') || '<div class="boxscore-empty">No stats yet.</div>'}
      </div>`;

    els.liveDetails.innerHTML =
      tbl(game.team1Players, game.team1, game.team1Score, t1Color) +
      tbl(game.team2Players, game.team2, game.team2Score, t2Color);
    els.liveModal.hidden = false;
  };
}

// ── Fetch & Boot ──────────────────────────────────────────────────────────────
async function fetchSheet(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
  const rows = parseCSV(await res.text());
  if (!rows.length) throw new Error('No data found.');
  return rows;
}

async function loadData() {
  try {
    const [liveData, scheduleData] = await Promise.all([
      fetchSheet(LIVE_SCORING_URL),
      fetchSheet(SCHEDULE_URL),
    ]);
    renderLiveScoring(liveData, scheduleData);
    renderSchedule(scheduleData);
  } catch (err) {
    els.liveRow.textContent = 'Failed to load: ' + err.message;
  }
}

document.addEventListener('click', e => {
  if (e.target.matches("[data-close='true']")) els.liveModal.hidden = true;
});

loadData();
</script>
</body>
</html>
