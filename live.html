<html lang="en">
<head>
<meta charset="UTF-8">

<title>Karma Rank League — Live Match Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--accentSoft:rgba(232,255,60,.15);
--red:#ff4a72;
--green:#4dff9d;
--text:#f5f5f5;
--muted:#7f8598;
--gold:#ffd95c;

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:
radial-gradient(circle at top center, rgba(232,255,60,.05), transparent 30%),
linear-gradient(to bottom,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
background-size:32px 32px;
pointer-events:none;
}

header{
position:relative;
padding:42px 20px 28px;
text-align:center;
border-bottom:1px solid var(--border);
z-index:2;
}

.header-top{
font-size:11px;
font-weight:800;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:10px;
}

h1{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,10vw,84px);
letter-spacing:.04em;
line-height:1;
}

h1 span{color:var(--accent);}

.subline{
margin-top:8px;
font-size:12px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
}

#live-badge{
display:none;
margin-top:16px;
padding:7px 16px;
border-radius:999px;
background:rgba(255,74,114,.08);
border:1px solid rgba(255,74,114,.28);
font-size:11px;

letter-spacing:.16em;
text-transform:uppercase;
color:var(--red);
}

main{
position:relative;
z-index:2;

margin:auto;
padding:28px 14px 80px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:24px;
}
.tab{
flex:1;
padding:11px 6px;
text-align:center;
font-size:12px;
font-weight:700;
letter-spacing:.07em;
text-transform:uppercase;
border-radius:10px;
border:1px solid var(--border);

cursor:pointer;
transition:all .2s;
}
.tab.active{background:var(--accent);color:#050508;border-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.section-title{
font-size:11px;
font-weight:800;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--muted);
margin:0 6px 16px;
}

#live-scoring p{
text-align:center;
padding:70px 0;
color:var(--muted);
}

.live-list{
display:flex;
flex-direction:column;
gap:14px;
}

.live-row-item{
background:linear-gradient(to bottom, rgba(255,255,255,.015), rgba(255,255,255,.005));
border:1px solid var(--border);
border-radius:18px;
padding:22px 18px;
cursor:pointer;
transition:.22s;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.22);
}

.live-row-item:hover{
transform:translateY(-3px);
border-color:rgba(232,255,60,.35);
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
gap:8px;
text-align:center;
}

.team-side{
display:flex;
flex-direction:column;
gap:5px;
}

.team-name{
font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:.04em;
line-height:1;
}

.team-score{
font-size:16px;
font-weight:800;
color:var(--accent);
}

.win-prob{
margin-top:5px;
font-size:12px;
font-weight:800;
letter-spacing:.05em;
}

.favorite{color:var(--green);}
.underdog{color:var(--red);}

.center-info{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.vs{
font-family:'Bebas Neue',sans-serif;
font-size:16px;
letter-spacing:.18em;
color:var(--muted);
}

.tap{
font-size:9px;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}

.projected{
margin-top:6px;
font-size:10px;
font-weight:700;
letter-spacing:.14em;
text-transform:uppercase;
color:var(--gold);
}

.schedule-group{margin-bottom:28px;}
.schedule-date{
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:.06em;
color:var(--accent);
margin-bottom:10px;
padding-bottom:8px;
border-bottom:1px solid var(--border);
}
.schedule-row{
display:flex;
align-items:center;
gap:12px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:14px 16px;
margin-bottom:8px;
}
.sched-team{
flex:1;
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:.04em;
}
.sched-vs{
font-size:11px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
}
.sched-team.right{text-align:right;}

#live-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
overflow:auto;
z-index:100;
}
#live-modal[hidden]{display:none;}

.modal-inner{width:100%;max-width:560px;}
.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}
.modal-title{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
letter-spacing:.08em;
color:var(--gold);
}
.close-btn{
background:var(--card);
border:1px solid var(--border);
color:var(--text);
padding:8px 15px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}
.boxscore-card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:18px;
margin-bottom:14px;
}
.boxscore-team{
display:flex;
justify-content:space-between;
align-items:center;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
padding-bottom:12px;
margin-bottom:10px;
border-bottom:1px solid var(--border);
}
.boxscore-score{font-size:16px;color:var(--accent);}
.boxscore-row{
display:grid;
grid-template-columns:1fr auto;
padding:8px 2px;
border-bottom:1px solid rgba(255,255,255,.03);
font-size:14px;
}
.header-row{
font-size:10px;
font-weight:800;
letter-spacing:.16em;
text-transform:uppercase;
color:var(--muted);
}
.boxscore-empty{color:var(--muted);font-style:italic;font-size:13px;padding:8px 0;}

.spinner{display:inline-block;width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{
position:relative;
z-index:2;
text-align:center;
padding-bottom:45px;
}
footer a{
display:inline-block;
padding:11px 22px;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
text-decoration:none;
color:var(--text);
font-size:12px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
}
</style>
</head>

<body>

<header>
<div class="header-top">Official KRL Live Scoring Site</div>
<h1>Karma <span>Rank</span> League</h1>
<div class="subline">Live Match Center</div>

</header>

<main>
<div class="tabs">
<div class="tab active" data-tab="live">🔴 Live</div>

</div>

<div id="live-scoring"><p><span class="spinner"></span> Loading live scores...</p></div>

</div>
</main>

<div id="live-modal" hidden>
<div class="modal-inner">
<div class="modal-header">
<div class="modal-title">Official Box Score</div>

</div>

</div>
</div>

<footer>
<a href="index.html">← Back to Home</a>
</footer>

<script>
// ── LIVE ODDS SYSTEM ─────────────────────────────────────────────

// Get EST hour (simple approximation using local time)
function getGameProgressFactor() {
  const now = new Date();
  const hour = now.getHours();

  // assume games mostly 7pm–11pm window
  // 7pm = early, 11pm = late game boost
  const start = 19; // 7pm
  const end = 23;

  let progress = (hour - start) / (end - start);
  progress = Math.max(0, Math.min(1, progress));
  return progress;
}

// Core win probability algorithm
function calculateWinProbability(score1, score2, team1, team2) {
  const s1 = parseFloat(score1);
  const s2 = parseFloat(score2);

  // if no scores yet
  if (isNaN(s1) || isNaN(s2)) {
    return {
      team1: 50,
      team2: 50,
      favorite: "Even"
    };
  }

  const diff = s1 - s2;
  const absDiff = Math.abs(diff);

  // time factor (late game increases certainty)
  const timeFactor = getGameProgressFactor();

  // base probability from score difference
  let base = 50 + (diff * 6);

  // boost certainty as game progresses
  let certaintyBoost = absDiff * (10 + timeFactor * 25);

  let p1 = base + certaintyBoost;
  let p2 = 100 - p1;

  // clamp
  p1 = Math.max(1, Math.min(99, p1));
  p2 = 100 - p1;

  const favorite = p1 > p2 ? team1 : team2;

  return {
    team1: Math.round(p1),
    team2: Math.round(p2),
    favorite
  };
}

// ── PATCH LIVE RENDER WITH ODDS ─────────────────────────────────

function enhanceGamesWithOdds(games) {
  return games.map(g => {
    const odds = calculateWinProbability(
      g.team1Score,
      g.team2Score,
      g.team1,
      g.team2
    );

    return {
      ...g,
      odds
    };
  });
}

// ── OVERRIDE LIVE RENDER FUNCTION ───────────────────────────────

const oldRenderLive = renderLiveScoring;

renderLiveScoring = function(liveRows, scheduleRows) {

  if (!liveRows.length) {
    els.liveRow.textContent = 'No live scoring available.';
    return;
  }

  const leagueDay = extractLeagueDay(liveRows);
  const liveGames = parseLiveGames(liveRows);
  const liveMap = new Map(liveGames.map(g => [g.key, g]));
  const idx = getLiveScheduleIndexes(scheduleRows);

  let games = scheduleRows.slice(1)
    .filter(row => String(row[idx.date] || '').trim() === leagueDay)
    .map(row => {
      const team1 = String(row[idx.team1] || '').trim();
      const team2 = String(row[idx.team2] || '').trim();
      const key = `${normalizeTeamName(team1)}|${normalizeTeamName(team2)}`;
      const live = liveMap.get(key) || null;

      return {
        team1,
        team2,
        team1Score: live ? live.team1Score : null,
        team2Score: live ? live.team2Score : null,
        team1Players: live ? live.team1Players : [],
        team2Players: live ? live.team2Players : []
      };
    });

  if (!games.length) games = liveGames;
  if (!games.length) {
    els.liveRow.textContent = 'No live games found.';
    return;
  }

  games = enhanceGamesWithOdds(games);

  const liveBadge = document.getElementById('live-badge');
  if (liveBadge) liveBadge.style.display = 'inline-block';

  window._liveGames = games;

  els.liveRow.innerHTML = `
    <div class="live-list">
      ${games.map((g, i) => {

        const odds = g.odds;

        const team1OddsClass = odds.team1 > odds.team2 ? "favorite" : "underdog";
        const team2OddsClass = odds.team2 > odds.team1 ? "favorite" : "underdog";

        return `
        <div class="live-row-item" data-index="${i}">

          <div class="live-matchup">

            <div class="team-side">
              <span class="team-name">${escapeHtml(g.team1)}</span>
              ${g.team1Score !== null ? `<span class="team-score">${escapeHtml(g.team1Score)}</span>` : ""}
              <div class="win-prob ${team1OddsClass}">
                ${odds.team1}%
              </div>
            </div>

            <div class="center-info">
              <span class="vs">VS</span>
              <span class="tap">Tap for box score</span>
              <div class="projected">
                Fav: ${escapeHtml(odds.favorite)}
              </div>
            </div>

            <div class="team-side" style="text-align:right;">
              <span class="team-name">${escapeHtml(g.team2)}</span>
              ${g.team2Score !== null ? `<span class="team-score">${escapeHtml(g.team2Score)}</span>` : ""}
              <div class="win-prob ${team2OddsClass}">
                ${odds.team2}%
              </div>
            </div>

          </div>

        </div>`;
      }).join('')}
    </div>
  `;

  els.liveRow.onclick = event => {
    const rowEl = event.target.closest('.live-row-item');
    if (!rowEl) return;

    const game = games[Number(rowEl.dataset.index)];
    if (!game) return;

    const s1 = parseFloat(game.team1Score);
    const s2 = parseFloat(game.team2Score);

    const tbl = (players, name, score) => `
      <div class="boxscore-card">
        <div class="boxscore-team">
          <span>${escapeHtml(name)}</span>
          ${score !== null ? `<span class="boxscore-score">${escapeHtml(score)}</span>` : ''}
        </div>

        <div class="boxscore-row header-row">
          <span>Player</span><span>Rank</span>
        </div>

        ${players.map(p => `
          <div class="boxscore-row">
            <span>${escapeHtml(p.player)}${p.captain ? " 🔥" : ""}</span>
            <span>${escapeHtml(p.rank || "—")}</span>
          </div>
        `).join('') || `<div class="boxscore-empty">No stats yet.</div>`}
      </div>
    `;

    els.liveDetails.innerHTML =
      tbl(game.team1Players, game.team1, game.team1Score) +
      tbl(game.team2Players, game.team2, game.team2Score);

    els.liveModal.hidden = false;
  };
};
