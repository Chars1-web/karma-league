<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma Rank League — Live Match Center</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05060a;
--bg2:#0b0d14;
--card:#11141d;
--border:#1f2431;
--accent:#e8ff3c;
--red:#ff4a72;
--green:#4dff9d;
--text:#f5f5f5;
--muted:#7f8598;
--gold:#ffd95c;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'DM Sans',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

header{
padding:40px 20px;
text-align:center;
border-bottom:1px solid var(--border);
}

h1{
font-family:'Bebas Neue';
font-size:70px;
}
h1 span{color:var(--accent);}

main{max-width:800px;margin:auto;padding:20px;}

.tabs{display:flex;gap:10px;margin-bottom:20px;}
.tab{
flex:1;
padding:10px;
background:var(--card);
border:1px solid var(--border);
color:var(--muted);
text-align:center;
cursor:pointer;
}
.tab.active{background:var(--accent);color:#000;}

.tab-content{display:none;}
.tab-content.active{display:block;}

.live-row-item{
background:var(--card);
border:1px solid var(--border);
padding:18px;
margin-bottom:12px;
border-radius:12px;
cursor:pointer;
}

.live-matchup{
display:grid;
grid-template-columns:1fr auto 1fr;
text-align:center;
align-items:center;
}

.team-name{font-family:'Bebas Neue';font-size:24px;}
.team-score{color:var(--accent);font-weight:800;}

.odds{
margin-top:8px;
font-size:12px;
color:var(--muted);
}

footer{
text-align:center;
padding:30px;
}
footer a{
color:var(--text);
text-decoration:none;
background:var(--card);
padding:10px 16px;
border-radius:10px;
border:1px solid var(--border);
}

/* modal */
#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}
.modal-box{
background:var(--card);
padding:20px;
border-radius:12px;
max-width:600px;
width:100%;
}
.close{
float:right;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Karma <span>Rank</span> League</h1>
</header>

<main>

<div class="tabs">
<div class="tab active" data-tab="live">Live</div>
<div class="tab" data-tab="schedule">Schedule</div>
</div>

<div id="live" class="tab-content active">
<div id="live-container">Loading...</div>
</div>

<div id="schedule" class="tab-content">
<div id="schedule-container">Loading schedule...</div>
</div>

</main>

<footer>
<a href="index.html">← Home</a>
</footer>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<div id="modal-content"></div>
</div>
</div>

<script>

const LIVE_URL = "/api/sheet?name=live-scoring";

const SCHEDULE_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSe6mW01Q2kgWDNkm-WDUtJziEmKHcpvvP-TKHy84jTjTXE_qIjEQZPDDPb36Xqn5k8t5-kpB6ipq1N/pub?gid=1186488561&single=true&output=csv";

// tabs
document.querySelectorAll(".tab").forEach(t=>{
t.onclick=()=>{
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));

t.classList.add("active");
document.getElementById(t.dataset.tab).classList.add("active");
};
});

// CSV parser
function parseCSV(text){
return text.trim().split("\n").map(r=>r.split(","));
}

// SIMPLE ODDS ALGORITHM (score only)
function calcOdds(t1,t2){
let s1=parseFloat(t1)||0;
let s2=parseFloat(t2)||0;

let diff=s1-s2;

// base 50/50
let base=50;

// shift by score diff
let shift=diff*3;

// clamp
let p1=Math.max(5,Math.min(95,base+shift));
let p2=100-p1;

return [p1.toFixed(1),p2.toFixed(1)];
}

// LIVE LOAD
async function loadLive(){
try{
let res=await fetch(LIVE_URL);
let txt=await res.text();
let rows=parseCSV(txt);

let games=[];

// very simple grouping (adjust if needed)
for(let i=0;i<rows.length;i++){
let r=rows[i];
if(!r[0]||!r[1]||!r[2]) continue;

let team1=r[0];
let team2=r[1];
let s1=r[2];
let s2=r[3];

if(team1 && team2){
games.push({team1,team2,s1,s2});
}
}

document.getElementById("live-container").innerHTML=
games.map((g,i)=>{

let [o1,o2]=calcOdds(g.s1,g.s2);

return `
<div class="live-row-item" onclick="openGame(${i})">
<div class="live-matchup">
<div>
<div class="team-name">${g.team1}</div>
<div class="team-score">${g.s1||0}</div>
</div>

<div>VS</div>

<div>
<div class="team-name">${g.team2}</div>
<div class="team-score">${g.s2||0}</div>
</div>
</div>

<div class="odds">
Odds → ${g.team1}: ${o1}% | ${g.team2}: ${o2}%
</div>
</div>
`;
}).join("") || "No live games";

window.games=games;

}catch(e){
document.getElementById("live-container").innerHTML="Failed to load live data";
}
}

// MODAL BOX SCORE
function openGame(i){
let g=window.games[i];
if(!g) return;

document.getElementById("modal-content").innerHTML=`
<h2>${g.team1} vs ${g.team2}</h2>
<p>Score: ${g.s1} - ${g.s2}</p>
`;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// SCHEDULE
async function loadSchedule(){
try{
let res=await fetch(SCHEDULE_URL);
let txt=await res.text();
let rows=parseCSV(txt).slice(1);

document.getElementById("schedule-container").innerHTML=
rows.map(r=>`
<div class="live-row-item">
${r[0]} — ${r[1]} vs ${r[2]}
</div>
`).join("");

}catch(e){
document.getElementById("schedule-container").innerHTML="Schedule failed to load";
}
}

loadLive();
loadSchedule();

</script>

</body>
</html>
