<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body{
    background:#050508;
    color:white;
    font-family:DM Sans;
    padding:20px;
}

.card{
    background:#13131c;
    padding:20px;
    border-radius:12px;
}

h1{
    font-family:Bebas Neue;
    color:#00e5ff;
}
</style>
</head>

<body>

<div class="card" id="profile">Loading...</div>

<script>
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv";

function parseCSV(text){
const rows=[];
let row=[],val="",q=false;

for(let i=0;i<text.length;i++){
const c=text[i],n=text[i+1];

if(c=='"'){q=!q;continue;}
if(c==","&&!q){row.push(val);val="";continue;}

if((c=="\n"||c=="\r")&&!q){
if(val||row.length){row.push(val);rows.push(row);row=[];val="";}
continue;
}

val+=c;
}

if(val||row.length){row.push(val);rows.push(row);}
return rows;
}

function load(){
const urlParams=new URLSearchParams(window.location.search);
const user=urlParams.get("player");

fetch(csvURL)
.then(r=>r.text())
.then(t=>{
const data=parseCSV(t);

let player;

for(let i=1;i<data.length;i++){
const r=data[i];

const username=r[0]?.trim();
const team=r[1]?.trim();

// C+
let games=[];
let unr=0;

r.slice(2).forEach(g=>{
g=(g||"").trim();

if(g==="") return;
if(g==="UNR"){unr++;games.push("UNR");return;}

let n=parseFloat(g);
if(!isNaN(n)) games.push(n);
});

if(username===user){
player={username,team,games,unr};
}
}

if(!player){
document.getElementById("profile").innerHTML="Player not found";
return;
}

let nums=player.games.filter(g=>typeof g==="number");

let avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):"-";

document.getElementById("profile").innerHTML=`
<h1>${player.username}</h1>
<p>Team: ${player.team}</p>
<p>Avg Rank: ${avg}</p>
<p>Games Played: ${player.games.length}</p>
<p>UNR: ${player.unr}</p>
`;
});
}

load();
</script>

</body>
</html>
