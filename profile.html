<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Profile – Ascended Karma League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508; --card: #13131c; --border: #1e1e2e;
      --accent: #e8ff3c; --accent2: #ff3c6e; --text: #f0f0f0; --muted: #6b6b80;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(232,255,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,60,0.03) 1px,transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    header { position: relative; z-index: 1; padding: 32px 24px 16px; text-align: center; border-bottom: 1px solid var(--border); }
    .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px,6vw,56px); letter-spacing: 0.04em; line-height: 1; }
    h1 span { color: var(--accent); }
    main { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 28px 16px 80px; }

```
/* Profile header */
.profile-header {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 28px 24px; margin-bottom: 20px; text-align: center;
}
.profile-avatar {
  width: 72px; height: 72px; border-radius: 50%; background: rgba(232,255,60,0.08);
  border: 2px solid rgba(232,255,60,0.3); display: flex; align-items: center;
  justify-content: center; margin: 0 auto 14px;
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent);
}
.profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.04em; margin-bottom: 4px; }
.profile-team { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 14px; text-align: center;
}
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); line-height: 1; }
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 5px; }
.stat-rank { font-size: 11px; color: var(--muted); margin-top: 4px; }
.stat-rank strong { color: var(--text); }

/* Game pills */
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.05em; margin-bottom: 12px; color: var(--text); }
.game-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
.pill { font-size: 12px; font-weight: 700; border-radius: 8px; padding: 5px 11px; }
.pill.ranked { background: rgba(232,255,60,0.1); border: 1px solid rgba(232,255,60,0.2); color: var(--accent); }
.pill.unranked { background: rgba(255,60,110,0.1); border: 1px solid rgba(255,60,110,0.2); color: var(--accent2); }
.pill.dnp { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); }

/* Leaderboard */
.lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
.lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.05em; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; transition: background 0.15s; cursor: pointer; }
.lb-row:last-child { border-bottom: none; }
.lb-row:hover { background: rgba(255,255,255,0.02); }
.lb-row.highlighted { background: rgba(232,255,60,0.06); border-left: 3px solid var(--accent); }
.lb-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
.lb-num.gold { color: #ffd700; }
.lb-num.silver { color: #c0c0c0; }
.lb-num.bronze { color: #cd7f32; }
.lb-name { flex: 1; font-weight: 600; }
.lb-team { font-size: 11px; color: var(--muted); }
.lb-val { font-weight: 700; color: var(--accent); font-size: 14px; }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px; color: var(--text); text-decoration: none;
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid var(--border); background: var(--card); padding: 10px 20px;
  border-radius: 10px; transition: all 0.2s; margin-bottom: 24px; display: block; text-align: center;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.empty-msg { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 0; }
.spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { position: relative; z-index: 1; text-align: center; padding: 0 0 40px; }
.home-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text); text-decoration: none; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--border); background: var(--card); padding: 10px 22px; border-radius: 10px; transition: border-color 0.2s, background 0.2s; }
.home-link:hover { border-color: var(--accent); background: rgba(232,255,60,0.06); color: var(--accent); }

<body>
<header>
  <div class="eyebrow">Player Profile</div>
  <h1>Ascended <span>Karma</span> League</h1>
</header>

<main id="main">
  <p class="empty-msg"><span class="spinner"></span> Loading…</p>
</main>

<footer><a href="index.html" class="home-link">← Home</a></footer>

<script>
  const STATS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv';

  const TEAM_NAMES = new Set([
    'ASCENDED','BLOODHAWKS','BULLETS','CRUSADERS','DAGGERS','DOGS','DUBS',
    'FALCONS','FIREBIRDS','KARMA CHEFS','LIGHTNING','MARTIANS','METHSTERS',
    'POLAR BEARS','STARS','THUNDER','TITANS','TOURISTS','VAMPIRES','WOLVES'
  ]);

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function parseCSV(text) {
    const rows = []; let row = [], val = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], n = text[i+1];
      if (c === '"') { if (inQ && n === '"') { val += '"'; i++; } else inQ = !inQ; continue; }
      if (c === ',' && !inQ) { row.push(val.trim()); val = ''; continue; }
      if ((c === '\n' || c === '\r') && !inQ) {
        if (c === '\r' && n === '\n') i++;
        row.push(val.trim());
        if (row.some(x => x)) rows.push(row);
        row = []; val = ''; continue;
      }
      val += c;
    }
    if (val || row.length) { row.push(val.trim()); rows.push(row); }
    return rows;
  }

  function isTeamRow(row) {
    return TEAM_NAMES.has((row[0]||'').trim().toUpperCase());
  }

  function calcStats(games) {
    const played = games.filter(g => g && g.toLowerCase() !== 'n/a');
    const unr = played.filter(g => g.toLowerCase() === 'unr').length;
    const nums = played.map(g => g.toLowerCase() === 'unr' ? 1000 : parseFloat(g)).filter(n => !isNaN(n));
    const avg = nums.length ? (nums.reduce((a,b) => a+b, 0) / nums.length) : null;
    return { gp: played.length, avg, unr };
  }

  function getGameMedians(allPlayers) {
    if (!allPlayers.length) return [];
    const maxGames = Math.max(...allPlayers.map(p => p.games.length));
    return Array.from({length: maxGames}, (_, i) => {
      const vals = allPlayers.map(p => p.games[i]).filter(g => g && g.toLowerCase() !== 'n/a')
        .map(g => g.toLowerCase() === 'unr' ? 1000 : parseFloat(g)).filter(n => !isNaN(n)).sort((a,b) => a-b);
      if (!vals.length) return null;
      const mid = Math.floor(vals.length / 2);
      return vals.length % 2 !== 0 ? vals[mid] : (vals[mid-1] + vals[mid]) / 2;
    });
  }

  function calcAboveMedian(games, medians) {
    let count = 0;
    games.forEach((g, i) => {
      if (!g || g.toLowerCase() === 'n/a') return;
      const val = g.toLowerCase() === 'unr' ? 1000 : parseFloat(g);
      if (!isNaN(val) && medians[i] !== null && val < medians[i]) count++;
    });
    return count;
  }


  function getGameMeans(allPlayers) {
    if (!allPlayers.length) return [];
    const maxGames = Math.max(...allPlayers.map(p => p.games.length));
    return Array.from({length: maxGames}, (_, i) => {
      const vals = allPlayers.map(p => p.games[i])
        .filter(g => g && g.toLowerCase() !== 'n/a' && g.toLowerCase() !== 'unr')
        .map(g => parseFloat(g)).filter(n => !isNaN(n));
      return vals.length ? vals.reduce((a,b) => a+b,0) / vals.length : null;
    });
  }

  function calcREL(games, medians, means) {
    let sumMed = 0, sumMean = 0, count = 0;
    games.forEach((g, i) => {
      if (!g || g.toLowerCase() === 'n/a' || g.toLowerCase() === 'unr') return;
      const val = parseFloat(g);
      if (isNaN(val) || val === 0) return;
      if (medians[i] !== null && medians[i] !== 0) sumMed  += medians[i] / val;
      if (means[i]   !== null && means[i]   !== 0) sumMean += means[i]   / val;
      count++;
    });
    return {
      relMed:  count ? (sumMed  / count).toFixed(3) : null,
      relMean: count ? (sumMean / count).toFixed(3) : null,
    };
  }

  function getRankLabel(rank) {
    if (rank === 1) return '🥇';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return '#' + rank;
  }

  function getNumClass(rank) {
    if (rank === 1) return 'gold';
    if (rank === 2) return 'silver';
    if (rank === 3) return 'bronze';
    return '';
  }

  async function load() {
    const params = new URLSearchParams(window.location.search);
    const targetUsername = decodeURIComponent(params.get('player') || '');
    const main = document.getElementById('main');

    if (!targetUsername) { main.innerHTML = '<p class="empty-msg">No player specified.</p>'; return; }

    try {
      const res = await fetch(STATS_URL, { cache: 'no-store' });
      const rows = parseCSV(await res.text());
      const headerRow = rows[0] || [];
      const gameCount = headerRow.slice(1).filter(c => c.toLowerCase().startsWith('game')).length || 20;

      let currentTeam = '';
      const allPlayers = [];

      for (const row of rows) {
        if (!row.length || !row[0]) continue;
        const first = row[0].trim();
        if (isTeamRow(row)) {
          currentTeam = first.split(' ').map(w => w.charAt(0) + w.slice(1).toLowerCase()).join(' ');
          continue;
        }
        if (!first.startsWith('@')) continue;
        allPlayers.push({ username: first, team: currentTeam, games: row.slice(1, 1 + gameCount).map(g => g.trim()) });
      }

      const player = allPlayers.find(p => p.username === targetUsername);
      if (!player) { main.innerHTML = `<p class="empty-msg">Player "${esc(targetUsername)}" not found.</p>`; return; }

      const medians = getGameMedians(allPlayers);
      const means = getGameMeans(allPlayers);

      // Calculate stats for all players for leaderboards
      const withStats = allPlayers.map(p => {
        const s = calcStats(p.games);
        return { ...p, gp: s.gp, avg: s.avg, unr: s.unr, above: calcAboveMedian(p.games, medians) };
      });

      const myStats = withStats.find(p => p.username === targetUsername);
      const myREL = calcREL(myStats.games, medians, means);

      // Rankings (lower avg = better, higher gp/above = better, lower unr = better)
      const rankBy = (arr, key, ascending) => {
        const sorted = [...arr].filter(p => p[key] !== null && p[key] !== undefined)
          .sort((a, b) => ascending ? a[key] - b[key] : b[key] - a[key]);
        const idx = sorted.findIndex(p => p.username === targetUsername);
        return idx === -1 ? null : idx + 1;
      };

      const rankGP    = rankBy(withStats, 'gp', false);
      const allWithREL = withStats.map(p => { const r = calcREL(p.games, medians, means); return {...p, relMed: parseFloat(r.relMed)||0, relMean: parseFloat(r.relMean)||0}; });
      const rankRelMed  = rankBy(allWithREL, 'relMed',  false);
      const rankRelMean = rankBy(allWithREL, 'relMean', false);
      const rankAvg   = rankBy(withStats.filter(p => p.avg !== null), 'avg', true);
      const rankUnr   = rankBy(withStats, 'unr', true);
      const rankAbove = rankBy(withStats, 'above', false);
      const totalPlayers = allPlayers.length;

      // Build leaderboards (top 10 + highlight current player)
      function buildLB(title, sorted, valFn, highlightUser) {
        const top = sorted.slice(0, 10);
        const playerInTop = top.some(p => p.username === highlightUser);
        const playerEntry = sorted.find(p => p.username === highlightUser);
        const playerRank = sorted.findIndex(p => p.username === highlightUser) + 1;

        let rows = top.map((p, i) => {
          const isMe = p.username === highlightUser;
          return `<div class="lb-row ${isMe ? 'highlighted' : ''}" onclick="window.location='profile.html?player='+encodeURIComponent('${esc(p.username)}')">
            <span class="lb-num ${getNumClass(i+1)}">${getRankLabel(i+1)}</span>
            <span class="lb-name">${esc(p.username)}<br><span class="lb-team">${esc(p.team)}</span></span>
            <span class="lb-val">${valFn(p)}</span>
          </div>`;
        }).join('');

        if (!playerInTop && playerEntry) {
          rows += `<div style="text-align:center;font-size:11px;color:var(--muted);padding:8px 0;">···</div>
          <div class="lb-row highlighted" onclick="window.location='profile.html?player='+encodeURIComponent('${esc(playerEntry.username)}')">
            <span class="lb-num">#${playerRank}</span>
            <span class="lb-name">${esc(playerEntry.username)}<br><span class="lb-team">${esc(playerEntry.team)}</span></span>
            <span class="lb-val">${valFn(playerEntry)}</span>
          </div>`;
        }

        return `<div class="lb-card"><div class="lb-title">${title}</div>${rows}</div>`;
      }

      const lbGP    = buildLB('Most Games Played', [...withStats].sort((a,b) => b.gp - a.gp), p => p.gp, targetUsername);
      const lbAvg   = buildLB('Best Avg Rank', [...withStats].filter(p => p.avg !== null).sort((a,b) => a.avg - b.avg), p => p.avg.toFixed(1), targetUsername);
      const lbUnr   = buildLB('Fewest Unranked', [...withStats].sort((a,b) => a.unr - b.unr), p => p.unr, targetUsername);
      const lbAbove = buildLB('Most Above Median', [...withStats].sort((a,b) => b.above - a.above), p => p.above, targetUsername);
      const lbRelMed  = buildLB('Best REL (Median)', [...allWithREL].sort((a,b) => b.relMed - a.relMed), p => p.relMed.toFixed(3), targetUsername);
      const lbRelMean = buildLB('Best REL (Mean)',   [...allWithREL].sort((a,b) => b.relMean - a.relMean), p => p.relMean.toFixed(3), targetUsername);

      // Game pills
      const pills = myStats.games.map((g, i) => {
        const v = g.trim();
        if (!v || v.toLowerCase() === 'n/a') return `<span class="pill dnp">G${i+1} DNP</span>`;
        if (v.toLowerCase() === 'unr') return `<span class="pill unranked">G${i+1} UNR</span>`;
        return `<span class="pill ranked">G${i+1} #${v}</span>`;
      }).join('');

      main.innerHTML = `
        <a href="stats.html" class="back-btn">← Back to Stats</a>

        <div class="profile-header">
          <div class="profile-avatar">${esc(targetUsername.replace('@','').slice(0,2).toUpperCase())}</div>
          <div class="profile-name">${esc(targetUsername)}</div>
          <a href="teams.html?team=${encodeURIComponent(myStats.team)}" style="text-decoration:none;"><div class="profile-team" style="cursor:pointer;">${esc(myStats.team)} →</div></a>
        </div>

        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-val">${myStats.gp}</div>
            <div class="stat-label">Games Played</div>
            <div class="stat-rank">Ranked <strong>${rankGP ? getRankLabel(rankGP) : '—'}</strong> of ${totalPlayers}</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${myStats.avg !== null ? myStats.avg.toFixed(1) : '—'}</div>
            <div class="stat-label">Avg Rank</div>
            <div class="stat-rank">Ranked <strong>${rankAvg ? getRankLabel(rankAvg) : '—'}</strong> of ${totalPlayers}</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${myStats.unr}</div>
            <div class="stat-label">Unranked</div>
            <div class="stat-rank">Ranked <strong>${rankUnr ? getRankLabel(rankUnr) : '—'}</strong> of ${totalPlayers}</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${myStats.above}</div>
            <div class="stat-label">Above Median</div>
            <div class="stat-rank">Ranked <strong>${rankAbove ? getRankLabel(rankAbove) : '—'}</strong> of ${totalPlayers}</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="${myREL.relMed && parseFloat(myREL.relMed)>=1 ? 'color:var(--accent)' : 'color:var(--accent2)'}">${myREL.relMed || '—'}</div>
            <div class="stat-label">REL (Median)</div>
            <div class="stat-rank">Ranked <strong>${rankRelMed ? getRankLabel(rankRelMed) : '—'}</strong> of ${totalPlayers}</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="${myREL.relMean && parseFloat(myREL.relMean)>=1 ? 'color:var(--accent)' : 'color:var(--accent2)'}">${myREL.relMean || '—'}</div>
            <div class="stat-label">REL (Mean)</div>
            <div class="stat-rank">Ranked <strong>${rankRelMean ? getRankLabel(rankRelMean) : '—'}</strong> of ${totalPlayers}</div>
          </div>
        </div>

        <div class="section-title">Game by Game</div>
        <div class="game-pills">${pills}</div>

        <div class="section-title">Leaderboards</div>
        ${lbAvg}${lbAbove}${lbGP}${lbUnr}${lbRelMed}${lbRelMean}
      `;

    } catch(e) {
      main.innerHTML = `<p class="empty-msg">Error: ${esc(e.message)}</p>`;
    }
  }

  load();
</script>

</body>
</html>
