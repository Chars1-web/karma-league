<script>
const STATS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSelmU6cnQuqpr25DszbMhGEal7AzZbyq5m45h1S14nYn4jO5sWsRRz8Mg5wSdGRfLX_SqOVCduvueD/pub?gid=0&single=true&output=csv';

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseCSV(text){
    const rows=[]; let row=[], val="", inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(c === '"'){
            if(inQ && n === '"'){ val+='"'; i++; }
            else inQ=!inQ;
            continue;
        }
        if(c === ',' && !inQ){ row.push(val.trim()); val=""; continue; }
        if((c === '\n' || c === '\r') && !inQ){
            if(c === '\r' && n === '\n') i++;
            row.push(val.trim());
            if(row.some(x=>x)) rows.push(row);
            row=[]; val=""; continue;
        }
        val += c;
    }
    if(val || row.length){ row.push(val.trim()); rows.push(row); }
    return rows;
}

function average(arr){ return arr.reduce((a,b)=>a+b,0)/arr.length; }

function median(arr){
    const sorted=[...arr].sort((a,b)=>a-b);
    const mid=Math.floor(sorted.length/2);
    return sorted.length%2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
}

function getGameMedians(players){
    const maxGames = Math.max(...players.map(p=>p.games.length));
    return Array.from({length:maxGames},(_,i)=>{
        const vals = players.map(p=>p.games[i])
            .filter(g=>g!=="" && g!=="UNR")
            .map(Number)
            .filter(n=>!isNaN(n))
            .sort((a,b)=>a-b);

        if(!vals.length) return null;
        const mid=Math.floor(vals.length/2);
        return vals.length%2 ? vals[mid] : (vals[mid-1]+vals[mid])/2;
    });
}

function getGameMeans(players){
    const maxGames = Math.max(...players.map(p=>p.games.length));
    return Array.from({length:maxGames},(_,i)=>{
        const vals = players.map(p=>p.games[i])
            .filter(g=>g!=="" && g!=="UNR")
            .map(Number)
            .filter(n=>!isNaN(n));

        return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    });
}

function calcAboveMedian(games, medians){
    let count = 0;
    games.forEach((g,i)=>{
        if(g==="" || g==="UNR") return;
        const num = parseFloat(g);
        if(!isNaN(num) && medians[i]!==null && num < medians[i]) count++;
    });
    return count;
}

function calcREL(games, medians, means){
    let sumMed=0, sumMean=0, count=0;

    games.forEach((g,i)=>{
        if(g==="" || g==="UNR") return;
        const num = parseFloat(g);
        if(isNaN(num)) return;

        if(medians[i]) sumMed += medians[i]/num;
        if(means[i]) sumMean += means[i]/num;
        count++;
    });

    return {
        relMed: count ? (sumMed/count).toFixed(3) : null,
        relMean: count ? (sumMean/count).toFixed(3) : null
    };
}

function getRankLabel(rank){
    if(rank===1) return '🥇';
    if(rank===2) return '🥈';
    if(rank===3) return '🥉';
    return '#'+rank;
}

function getNumClass(rank){
    if(rank===1) return 'gold';
    if(rank===2) return 'silver';
    if(rank===3) return 'bronze';
    return '';
}

async function load(){
    const params = new URLSearchParams(window.location.search);
    const targetUsername = decodeURIComponent(params.get('player') || '').replace('@','').toLowerCase();
    const main = document.getElementById('main');

    if(!targetUsername){
        main.innerHTML = '<p class="empty-msg">No player specified.</p>';
        return;
    }

    try{
        const res = await fetch(STATS_URL,{cache:'no-store'});
        const rows = parseCSV(await res.text());

        const allPlayers = [];

        for(let i=1;i<rows.length;i++){
            const row = rows[i];

            const usernameRaw = (row[0] || "").trim();
            const username = usernameRaw.replace('@','');
            const team = (row[1] || "").trim();

            if(!username) continue;

            const games = row.slice(2).map(x=>(x || "").trim().toUpperCase());

            const playedGames = games.filter(g=>g!=="");
            const unr = playedGames.filter(g=>g==="UNR").length;
            const numericGames = playedGames.filter(g=>g!=="UNR").map(Number).filter(n=>!isNaN(n));
            const avg = numericGames.length ? average(numericGames) : null;

            allPlayers.push({
                username: usernameRaw,
                cleanName: username.toLowerCase(),
                team,
                games,
                gp: playedGames.length,
                unr,
                avg
            });
        }

        const player = allPlayers.find(p=>p.cleanName===targetUsername);

        if(!player){
            main.innerHTML = `<p class="empty-msg">Player not found.</p>`;
            return;
        }

        const medians = getGameMedians(allPlayers);
        const means = getGameMeans(allPlayers);

        allPlayers.forEach(p=>{
            p.above = calcAboveMedian(p.games, medians);
            const rel = calcREL(p.games, medians, means);
            p.relMed = parseFloat(rel.relMed)||0;
            p.relMean = parseFloat(rel.relMean)||0;
        });

        const myREL = { relMed: player.relMed.toFixed(3), relMean: player.relMean.toFixed(3) };

        function rankBy(arr,key,ascending){
            const sorted = [...arr].filter(p=>p[key]!==null).sort((a,b)=>ascending ? a[key]-b[key] : b[key]-a[key]);
            return sorted.findIndex(p=>p.cleanName===targetUsername)+1;
        }

        const rankGP = rankBy(allPlayers,'gp',false);
        const rankAvg = rankBy(allPlayers.filter(p=>p.avg!==null),'avg',true);
        const rankUnr = rankBy(allPlayers,'unr',true);
        const rankAbove = rankBy(allPlayers,'above',false);
        const rankRelMed = rankBy(allPlayers,'relMed',false);
        const rankRelMean = rankBy(allPlayers,'relMean',false);

        const totalPlayers = allPlayers.length;

        function buildLB(title, sorted, valFn){
            const top = sorted.slice(0,10);
            const meInTop = top.some(p=>p.cleanName===targetUsername);
            const me = sorted.find(p=>p.cleanName===targetUsername);
            const myRank = sorted.findIndex(p=>p.cleanName===targetUsername)+1;

            let rows = top.map((p,i)=>`
                <div class="lb-row ${p.cleanName===targetUsername?'highlighted':''}" onclick="window.location='profile.html?player='+encodeURIComponent('${esc(p.username)}')">
                    <span class="lb-num ${getNumClass(i+1)}">${getRankLabel(i+1)}</span>
                    <span class="lb-name">${esc(p.username)}<br><span class="lb-team">${esc(p.team)}</span></span>
                    <span class="lb-val">${valFn(p)}</span>
                </div>
            `).join('');

            if(!meInTop && me){
                rows += `<div style="text-align:center;font-size:11px;color:var(--muted);padding:8px 0;">···</div>
                <div class="lb-row highlighted" onclick="window.location='profile.html?player='+encodeURIComponent('${esc(me.username)}')">
                    <span class="lb-num">#${myRank}</span>
                    <span class="lb-name">${esc(me.username)}<br><span class="lb-team">${esc(me.team)}</span></span>
                    <span class="lb-val">${valFn(me)}</span>
                </div>`;
            }

            return `<div class="lb-card"><div class="lb-title">${title}</div>${rows}</div>`;
        }

        const lbAvg = buildLB('Best Avg Rank',[...allPlayers].filter(p=>p.avg!==null).sort((a,b)=>a.avg-b.avg),p=>p.avg.toFixed(1));
        const lbAbove = buildLB('Most Above Median',[...allPlayers].sort((a,b)=>b.above-a.above),p=>p.above);
        const lbGP = buildLB('Most Games Played',[...allPlayers].sort((a,b)=>b.gp-a.gp),p=>p.gp);
        const lbUnr = buildLB('Fewest Unranked',[...allPlayers].sort((a,b)=>a.unr-b.unr),p=>p.unr);
        const lbRelMed = buildLB('Best REL (Median)',[...allPlayers].sort((a,b)=>b.relMed-a.relMed),p=>p.relMed.toFixed(3));
        const lbRelMean = buildLB('Best REL (Mean)',[...allPlayers].sort((a,b)=>b.relMean-a.relMean),p=>p.relMean.toFixed(3));

        const pills = player.games.map((g,i)=>{
            if(g==="") return `<span class="pill dnp">G${i+1} DNP</span>`;
            if(g==="UNR") return `<span class="pill unranked">G${i+1} UNR</span>`;
            return `<span class="pill ranked">G${i+1} #${g}</span>`;
        }).join('');

        main.innerHTML = `
        <a href="stats.html" class="back-btn">← Back to Stats</a>

        <div class="profile-header">
            <div class="profile-avatar">${esc(player.username.replace('@','').slice(0,2).toUpperCase())}</div>
            <div class="profile-name">${esc(player.username)}</div>
            <div class="profile-team">${esc(player.team)}</div>
        </div>

        <div class="stat-grid">
            <div class="stat-box"><div class="stat-val">${player.gp}</div><div class="stat-label">Games Played</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankGP)}</strong> of ${totalPlayers}</div></div>
            <div class="stat-box"><div class="stat-val">${player.avg ? player.avg.toFixed(1) : '—'}</div><div class="stat-label">Avg Rank</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankAvg)}</strong> of ${totalPlayers}</div></div>
            <div class="stat-box"><div class="stat-val">${player.unr}</div><div class="stat-label">Unranked</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankUnr)}</strong> of ${totalPlayers}</div></div>
            <div class="stat-box"><div class="stat-val">${player.above}</div><div class="stat-label">Above Median</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankAbove)}</strong> of ${totalPlayers}</div></div>
            <div class="stat-box"><div class="stat-val">${myREL.relMed}</div><div class="stat-label">REL (Median)</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankRelMed)}</strong> of ${totalPlayers}</div></div>
            <div class="stat-box"><div class="stat-val">${myREL.relMean}</div><div class="stat-label">REL (Mean)</div><div class="stat-rank">Ranked <strong>${getRankLabel(rankRelMean)}</strong> of ${totalPlayers}</div></div>
        </div>

        <div class="section-title">Game by Game</div>
        <div class="game-pills">${pills}</div>

        <div class="section-title">Leaderboards</div>
        ${lbAvg}${lbAbove}${lbGP}${lbUnr}${lbRelMed}${lbRelMean}
        `;
    }catch(e){
        main.innerHTML = `<p class="empty-msg">Error: ${esc(e.message)}</p>`;
    }
}

load();
</script>
