*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,255,60,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,255,60,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 1;
  padding: 40px 24px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.header-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 8vw, 72px);
  letter-spacing: 0.04em;
  line-height: 1;
}

h1 span { color: var(--accent); }

main {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 16px 80px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.conference {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}

.conference-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.conference-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.08em;
  color: var(--accent);
}

.conference-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 2px 8px;
}

/* Table */
.standings-table {
  width: 100%;
  border-collapse: collapse;
}

.standings-table thead tr {
  border-bottom: 1px solid var(--border);
}

.standings-table th {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 20px;
  text-align: left;
}

.standings-table th:not(:first-child) { text-align: center; }

.standings-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}

.standings-table tbody tr:last-child { border-bottom: none; }
.standings-table tbody tr:hover { background: rgba(255,255,255,0.02); }

.standings-table td {
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
}

.standings-table td:not(:first-child) { text-align: center; color: var(--muted); }

.rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: var(--muted);
  width: 24px;
  display: inline-block;
  text-align: center;
  margin-right: 4px;
}

.team-name { font-weight: 700; color: var(--text); }

.first-seed .team-name { color: var(--accent); }
.first-seed .rank { color: var(--accent); }

.win-pct {
  font-weight: 700;
  color: var(--text) !important;
}

.gb-dash { color: var(--accent) !important; font-weight: 700; }

.seed-divider-out td {
  border-top: 2px solid rgba(232,255,60,0.15) !important;
  padding-top: 14px;
}

footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 0 40px;
}

.home-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 10px 22px;
  border-radius: 10px;
  transition: border-color 0.2s, background 0.2s;
}

.home-link:hover {
  border-color: var(--accent);
  background: rgba(232,255,60,0.06);
  color: var(--accent);
}

<body>

  <header>
    <div class="header-eyebrow">Season Standings</div>
    <h1>Ascended <span>Karma</span> League</h1>
  </header>

  <main id="main"></main>

  <footer>
    <a href="index.html" class="home-link">← Home</a>
  </footer>

  <script>
    const CONFERENCES = [
      {
        name: "Northern Conference",
        teams: [
          { name: "Firebirds",   w: 1, l: 4 },
          { name: "Lightning",   w: 3, l: 2 },
          { name: "Polar Bears", w: 1, l: 5 },
          { name: "Crusaders",   w: 5, l: 0 },
          { name: "Bullets",     w: 3, l: 3 },
          { name: "Martians",    w: 3, l: 2 },
          { name: "Wolves",      w: 3, l: 2 },
          { name: "Karma Chefs", w: 0, l: 6 },
        ]
      },
      {
        name: "Southern Conference",
        teams: [
          { name: "Methsters",  w: 1, l: 4 },
          { name: "Ascended",   w: 4, l: 2 },
          { name: "Bloodhawks", w: 4, l: 2 },
          { name: "Stars",      w: 3, l: 2 },
          { name: "Dubs",       w: 5, l: 1 },
          { name: "Vampires",   w: 0, l: 6 },
          { name: "Thunder",    w: 5, l: 0 },
          { name: "Tourists",   w: 2, l: 4 },
          { name: "Dogs",       w: 3, l: 3 },
          { name: "Falcons",    w: 3, l: 2 },
        ]
      }
    ];

    function calcGB(topW, topL, w, l) {
      const gb = ((topW - w) + (l - topL)) / 2;
      if (gb <= 0) return '-';
      return gb % 1 === 0 ? gb.toString() : gb.toFixed(1);
    }

    function calcPct(w, l) {
      const g = w + l;
      if (g === 0) return '.000';
      return (w / g).toFixed(3).replace(/^0/, '');
    }

    function renderConference(conf) {
      const sorted = [...conf.teams].sort((a, b) => {
        const pctA = a.w / (a.w + a.l || 1), pctB = b.w / (b.w + b.l || 1);
        if (pctB !== pctA) return pctB - pctA;
        return b.w - a.w;
      });

      const top = sorted[0];
      const rows = sorted.map((team, i) => {
        const gb = calcGB(top.w, top.l, team.w, team.l);
        const pct = calcPct(team.w, team.l);
        const isFirst = i === 0;
        const isPlayoffDivider = i === 3;
        const isPlayInDivider  = i === 5;

        return `
          <tr class="${isFirst ? 'first-seed' : ''} ${isPlayoffDivider ? 'seed-divider' : ''} ${isPlayInDivider ? 'seed-divider-out' : ''}">
            <td>
              <span class="rank">${i + 1}</span>
              <span class="team-name">${team.name}</span>
            </td>
            <td>${team.w}</td>
            <td>${team.l}</td>
            <td class="win-pct">${pct}</td>
            <td class="${gb === '-' ? 'gb-dash' : ''}">${gb}</td>
          </tr>`;
      }).join('');

      return `
        <div class="conference">
          <div class="conference-header">
            <span class="conference-name">${conf.name}</span>
            <span class="conference-badge">${conf.teams.length} Teams</span>
          </div>
          <table class="standings-table">
            <thead>
              <tr>
                <th>Team</th>
                <th>W</th>
                <th>L</th>
                <th>PCT</th>
                <th>GB</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    document.getElementById('main').innerHTML = CONFERENCES.map(renderConference).join('');
  </script>

</body>
</html>
